<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeWave - 技术内容音频学习</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        * {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        
        :root {
            --primary-indigo: 99, 102, 241;
            --slate-950: 9, 10, 17;
            --slate-900: 15, 23, 42;
            --slate-800: 30, 41, 59;
            --slate-700: 51, 65, 85;
            --slate-400: 148, 163, 184;
            --slate-200: 226, 232, 240;
        }
        
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        
        /* 自定义滚动条 */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        /* 动画效果 */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes slideInFromBottom {
            from { transform: translateY(10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        @keyframes ping {
            75%, 100% { transform: scale(2); opacity: 0; }
        }
        
        .animate-in {
            animation: fadeIn 0.5s ease-out;
        }
        
        .slide-in-from-bottom-2 {
            animation: slideInFromBottom 0.3s ease-out;
        }
        
        .animate-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        .animate-ping {
            animation: ping 1s cubic-bezier(0, 0, 0.2, 1) infinite;
        }
        
        .zoom-in-95 {
            transform-origin: center;
            animation: fadeIn 0.3s ease-out, zoomIn 0.3s ease-out;
        }
        
        @keyframes zoomIn {
            from { transform: scale(0.95); }
            to { transform: scale(1); }
        }
        
        /* 代码块样式 */
        .code-block {
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.5;
            white-space: pre-wrap;
            tab-size: 2;
        }
        
        /* 毛玻璃效果 */
        .backdrop-blur-md {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        
        /* 渐变混合模式 */
        .mix-blend-screen {
            mix-blend-mode: screen;
        }
        
        .line-clamp-2 {
            overflow: hidden;
            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 2;
        }
        
        .line-clamp-3 {
            overflow: hidden;
            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 3;
        }
        
        /* 过渡效果 */
        .transition-all {
            transition-property: all;
            transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
            transition-duration: 300ms;
        }
        
        .transition-colors {
            transition-property: background-color, border-color, color, fill, stroke;
            transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
            transition-duration: 300ms;
        }
        
        .transition-transform {
            transition-property: transform;
            transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
            transition-duration: 300ms;
        }
        
        .active\:scale-\[0\.98\]:active {
            transform: scale(0.98);
        }
        
        .hover\:scale-105:hover {
            transform: scale(1.05);
        }
        
        .active\:scale-95:active {
            transform: scale(0.95);
        }
        
        .cursor-pointer {
            cursor: pointer;
        }
        
        /* 阴影效果 */
        .shadow-lg {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        
        .shadow-2xl {
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        
        .shadow-indigo-500\/20 {
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
        }
        
        /* 自定义圆角 */
        .rounded-xl {
            border-radius: 0.75rem;
        }
        
        .rounded-3xl {
            border-radius: 1.5rem;
        }
        
        /* 自定义背景渐变 */
        .bg-gradient-to-br {
            background-image: linear-gradient(to bottom right, var(--tw-gradient-stops));
        }
        
        /* 对比度调整 */
        .contrast-125 {
            filter: contrast(1.25);
        }
        
        /* 响应式设计 */
        @media (max-width: 640px) {
            .text-3xl {
                font-size: 1.875rem;
                line-height: 2.25rem;
            }
            
            .text-2xl {
                font-size: 1.5rem;
                line-height: 2rem;
            }
        }
    </style>
</head>
<body class="text-slate-100">
    <div id="app" class="w-full h-screen max-w-md mx-auto flex flex-col overflow-hidden font-sans bg-slate-950">
        <!-- 应用将在这里渲染 -->
    </div>

    <script>
        // 模拟数据
        const MOCK_LIBRARY = [
            {
                id: 1,
                title: "React Hooks 深度性能优化指南",
                author: "Dan A.",
                duration: "12:40",
                category: "Frontend",
                segments: [
                    { type: 'text', content: "在现代 React 开发中，useMemo 和 useCallback 是优化渲染性能的两个重要钩子。很多开发者存在误用，导致适得其反。" },
                    { type: 'text', content: "让我们来看一个典型的性能瓶颈场景：父组件仅仅因为状态更新，导致昂贵的子组件重复渲染。" },
                    { 
                        type: 'code', 
                        lang: 'javascript',
                        raw: `const Parent = () => {
  const [count, setCount] = useState(0);
  // 错误：每次渲染都会创建新函数引用
  const handleClick = () => console.log('Clicked');
  
  return <ExpensiveChild onClick={handleClick} />;
};`,
                        summary: "这段代码展示了一个反模式：在父组件中定义普通箭头函数 handleClick，导致每次渲染时函数引用发生变化，进而触发 ExpensiveChild 的无意义重渲染。",
                        label: "JavaScript 代码块：父组件中的函数引用问题示例" 
                    },
                    { type: 'text', content: "为了解决这个问题，我们需要使用 useCallback 来包裹该函数，确保引用稳定性。" },
                    {
                        type: 'code',
                        lang: 'javascript',
                        raw: `const handleClick = useCallback(() => {
  console.log('Clicked');
}, []); // 依赖数组为空，函数引用永久保持不变`,
                        summary: "修复后的代码：使用了 useCallback 钩子包裹回调函数，依赖数组为空，确保了函数引用的稳定性。",
                        label: "JavaScript 代码块：使用 useCallback 的正确实现"
                    },
                    { type: 'text', content: "只要依赖项数组没有变化，React 就会复用上一次的函数实例，从而配合 React.memo 避免子组件重渲染。" }
                ]
            },
            {
                id: 2,
                title: "Rust 所有权机制图解",
                author: "Steve K.",
                duration: "18:20",
                category: "System",
                segments: [
                    { type: 'text', content: "Rust 的核心特性就是所有权。它让 Rust 无需垃圾回收即可保证内存安全。" },
                    { type: 'code', lang: 'rust', raw: `fn main() {
    let s1 = String::from("hello");
    let s2 = s1; // s1 被移动到了 s2
    // println!("{}, world!", s1); // 错误：s1 已失效
}`, summary: "这段代码演示了 Rust 的所有权转移（Move）语义。当 s1 赋值给 s2 时，s1 的所有权被移交，原变量失效，防止了二次释放错误。", label: "Rust 代码块：所有权移动示例" },
                    { type: 'text', content: "理解 Move 语义是掌握 Rust 的第一步。这与 Java 或 Go 的引用复制完全不同。" }
                ]
            },
            {
                id: 3,
                title: "微服务架构中的分布式事务",
                author: "Sam N.",
                duration: "24:15",
                category: "Architecture",
                segments: [
                    { type: 'text', content: "在微服务架构下，由于数据库被拆分，传统的 ACID 事务无法跨服务使用。我们需要引入 Saga 模式。" },
                    { type: 'text', content: "Saga 模式通过一系列本地事务来模拟全局事务，如果某个步骤失败，则执行补偿操作。" },
                    { type: 'code', lang: 'yaml', raw: `saga:
  - step: OrderService.createOrder
    compensation: OrderService.cancelOrder
  - step: PaymentService.processPayment
    compensation: PaymentService.refundPayment`, summary: "这是一个 Saga 事务流程的伪代码描述。定义了订单创建和支付处理的正向操作，以及对应的取消订单和退款的补偿操作。", label: "YAML 配置：Saga 事务编排" }
                ]
            },
            {
                id: 4,
                title: "Kubernetes Pod 生命周期管理",
                author: "Brendan B.",
                duration: "15:05",
                category: "DevOps",
                segments: [
                    { type: 'text', content: "Pod 是 K8s 中的最小调度单元。了解 Pod 的生命周期对于排查 CrashLoopBackOff 错误至关重要。" }
                ]
            }
        ];

        // 应用状态
        let appState = {
            activeTab: 'player', // 'library', 'player'
            currentArticle: MOCK_LIBRARY[0],
            isPlaying: false,
            currentSegmentIndex: 0,
            progress: 0,
            sceneMode: 'standard', // 'standard', 'driving', 'gym'
            codeMode: 'summary', // 'skip', 'label', 'summary'
            playbackSpeed: 1.0,
            intervalId: null
        };

        // 工具函数
        const getSceneStyles = () => {
            switch(appState.sceneMode) {
                case 'driving':
                    return 'bg-slate-900 contrast-125';
                case 'gym':
                    return 'bg-slate-900';
                default:
                    return 'bg-slate-950';
            }
        };

        const getButtonSize = () => {
            return appState.sceneMode === 'driving' ? 'h-24 w-24' : 'h-16 w-16';
        };

        // 模拟播放逻辑
        const startPlaybackSimulation = () => {
            if (appState.intervalId) {
                clearInterval(appState.intervalId);
            }
            
            appState.intervalId = setInterval(() => {
                if (!appState.isPlaying) return;
                
                appState.progress += 0.5 * appState.playbackSpeed;
                
                // 根据内容类型调整速度
                const currentSegment = appState.currentArticle.segments[appState.currentSegmentIndex];
                if (currentSegment) {
                    let speedFactor = 1;
                    
                    if (currentSegment.type === 'code') {
                        if (appState.codeMode === 'skip') {
                            appState.progress = 100;
                        } else if (appState.codeMode === 'label') {
                            speedFactor = 2;
                        } else if (appState.codeMode === 'summary') {
                            speedFactor = 0.8;
                        }
                    }
                    
                    appState.progress += (0.5 * appState.playbackSpeed * speedFactor);
                }
                
                // 检查是否完成当前片段
                if (appState.progress >= 100) {
                    // 移动到下一个片段
                    if (appState.currentSegmentIndex < appState.currentArticle.segments.length - 1) {
                        appState.currentSegmentIndex++;
                        appState.progress = 0;
                    } else {
                        appState.isPlaying = false;
                        appState.progress = 100;
                    }
                }
                
                // 更新UI
                renderPlayerContent();
                updateProgressBar();
            }, 50);
        };

        // 处理文章选择
        const handlePlayArticle = (article) => {
            appState.currentArticle = article;
            appState.currentSegmentIndex = 0;
            appState.progress = 0;
            appState.isPlaying = true;
            appState.activeTab = 'player';
            
            startPlaybackSimulation();
            render();
        };

        // 播放/暂停切换
        const togglePlayPause = () => {
            appState.isPlaying = !appState.isPlaying;
            
            if (appState.isPlaying) {
                startPlaybackSimulation();
            } else {
                if (appState.intervalId) {
                    clearInterval(appState.intervalId);
                    appState.intervalId = null;
                }
            }
            
            renderPlayerContent();
        };

        // 上一个/下一个片段
        const goToPreviousSegment = () => {
            if (appState.currentSegmentIndex > 0) {
                appState.currentSegmentIndex--;
                appState.progress = 0;
                renderPlayerContent();
                updateProgressBar();
            }
        };

        const goToNextSegment = () => {
            if (appState.currentSegmentIndex < appState.currentArticle.segments.length - 1) {
                appState.currentSegmentIndex++;
                appState.progress = 0;
                renderPlayerContent();
                updateProgressBar();
            }
        };

        // 更新进度条
        const updateProgressBar = () => {
            const progressBar = document.getElementById('progress-bar');
            if (progressBar) {
                const progressPercent = ((appState.currentSegmentIndex / appState.currentArticle.segments.length) * 100) + 
                                       (appState.progress / appState.currentArticle.segments.length);
                progressBar.style.width = `${progressPercent}%`;
            }
        };

        // 渲染播放器内容
        const renderPlayerContent = () => {
            const contentContainer = document.getElementById('player-content');
            if (!contentContainer) return;
            
            const segment = appState.currentArticle.segments[appState.currentSegmentIndex] || 
                           { type: 'text', content: "内容结束。" };
            
            if (segment.type === 'text') {
                contentContainer.innerHTML = `
                    <div class="p-6 transition-all duration-500 ease-in-out animate-in">
                        <p class="text-xl leading-relaxed text-slate-200 font-medium">
                            ${segment.content}
                        </p>
                    </div>
                `;
            } else if (segment.type === 'code') {
                if (appState.codeMode === 'skip') {
                    contentContainer.innerHTML = `
                        <div class="flex items-center justify-center h-48 animate-pulse text-slate-500">
                            <i class="fas fa-forward mr-2 text-xl"></i>
                            <span>已自动跳过代码块...</span>
                        </div>
                    `;
                } else if (appState.codeMode === 'label') {
                    contentContainer.innerHTML = `
                        <div class="p-6 bg-slate-800 rounded-lg border border-indigo-500/30 slide-in-from-bottom-2">
                            <div class="flex items-center text-indigo-400 mb-4">
                                <i class="fas fa-code mr-2 text-xl"></i>
                                <span class="font-bold">语音标注模式</span>
                            </div>
                            <p class="text-lg text-slate-300 italic">
                                "正在朗读：${segment.label}"
                            </p>
                            <div class="mt-4 opacity-50 text-xs font-mono text-slate-500 line-clamp-3 code-block">
                                ${segment.raw}
                            </div>
                        </div>
                    `;
                } else if (appState.codeMode === 'summary') {
                    contentContainer.innerHTML = `
                        <div class="p-4 bg-gradient-to-br from-slate-800 to-indigo-900/40 rounded-xl border border-indigo-500 slide-in-from-bottom-2">
                            <div class="flex items-center justify-between text-indigo-300 mb-3">
                                <div class="flex items-center">
                                    <i class="fas fa-microchip mr-2 animate-pulse"></i>
                                    <span class="font-bold text-sm">AI 语义摘要生成中</span>
                                </div>
                                <span class="text-xs bg-indigo-500/20 px-2 py-1 rounded">GPT-4 Turbo</span>
                            </div>
                            <p class="text-lg text-white leading-relaxed">
                                ${segment.summary}
                            </p>
                            <div class="mt-4 p-3 bg-black/30 rounded text-xs font-mono text-slate-400 overflow-hidden relative">
                                <div class="absolute top-0 right-0 p-1 bg-red-500/20 text-red-400 text-[10px] rounded-bl">源代码(已静音)</div>
                                <div class="code-block">${segment.raw}</div>
                            </div>
                        </div>
                    `;
                }
            }
            
            updateProgressBar();
        };

        // 渲染库视图
        const renderLibrary = () => {
            return `
                <div class="flex-1 flex flex-col h-full bg-slate-900 overflow-hidden">
                    <div class="p-6 pt-8 pb-4 bg-slate-900/90 backdrop-blur-md z-10 border-b border-slate-800">
                        <div class="flex items-center space-x-3 mb-6">
                            <button onclick="appState.activeTab='player'; render();" class="p-2 -ml-2 hover:bg-slate-800 rounded-full transition-colors">
                                <i class="fas fa-arrow-left text-slate-400 text-xl"></i>
                            </button>
                            <h1 class="text-2xl font-bold text-white">知识库</h1>
                        </div>
                        
                        <!-- 搜索/筛选 -->
                        <div class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                            ${['全部', 'Frontend', 'System', 'Architecture', 'DevOps'].map((tag, i) => `
                                <span class="px-4 py-1.5 rounded-full text-xs font-medium whitespace-nowrap ${i === 0 ? 'bg-indigo-600 text-white' : 'bg-slate-800 text-slate-400 border border-slate-700'}">
                                    ${tag}
                                </span>
                            `).join('')}
                        </div>
                    </div>

                    <div class="flex-1 overflow-y-auto p-4 space-y-3">
                        ${MOCK_LIBRARY.map((article) => {
                            const isCurrent = appState.currentArticle.id === article.id;
                            const isPlaying = isCurrent && appState.isPlaying;
                            
                            return `
                                <div 
                                    onclick="handlePlayArticle(${JSON.stringify(article).replace(/"/g, '&quot;')})"
                                    class="group relative p-4 rounded-xl border transition-all cursor-pointer active:scale-[0.98] ${isCurrent && isPlaying ? 'bg-indigo-900/20 border-indigo-500/50' : 'bg-slate-800/50 border-slate-800 hover:bg-slate-800 hover:border-slate-700'}"
                                >
                                    <div class="flex justify-between items-start">
                                        <div class="flex-1 pr-4">
                                            <div class="flex items-center gap-2 mb-1">
                                                <span class="text-[10px] font-bold text-indigo-400 uppercase tracking-wider">${article.category}</span>
                                                ${isCurrent && isPlaying ? `
                                                    <span class="flex h-2 w-2 relative">
                                                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-indigo-400 opacity-75"></span>
                                                        <span class="relative inline-flex rounded-full h-2 w-2 bg-indigo-500"></span>
                                                    </span>
                                                ` : ''}
                                            </div>
                                            <h3 class="font-bold text-lg mb-2 line-clamp-2 ${isCurrent ? 'text-indigo-200' : 'text-slate-200 group-hover:text-white'}">
                                                ${article.title}
                                            </h3>
                                            <div class="flex items-center gap-4 text-xs text-slate-500 font-mono">
                                                <span class="flex items-center gap-1"><i class="fas fa-user text-[10px]"></i> ${article.author}</span>
                                                <span class="flex items-center gap-1"><i class="fas fa-clock text-[10px]"></i> ${article.duration}</span>
                                            </div>
                                        </div>
                                        <div class="mt-1 p-2 rounded-full transition-colors ${isCurrent ? 'text-indigo-400 bg-indigo-500/10' : 'text-slate-600 bg-slate-900 group-hover:text-indigo-400 group-hover:bg-indigo-500/10'}">
                                            ${isCurrent && isPlaying ? 
                                                '<i class="fas fa-volume-up text-xl animate-pulse"></i>' : 
                                                '<i class="fas fa-play-circle text-xl"></i>'
                                            }
                                        </div>
                                    </div>
                                </div>
                            `;
                        }).join('')}
                        <!-- 底部填充用于滚动 -->
                        <div class="h-12"></div>
                    </div>
                </div>
            `;
        };

        // 渲染播放器视图
        const renderPlayer = () => {
            return `
                <!-- 播放器视图 -->
                
                <!-- 1. 顶部栏：场景选择器 -->
                <div class="flex justify-between items-center p-4 bg-slate-900/50 backdrop-blur-md border-b border-slate-800 z-10">
                    <div class="flex items-center space-x-2">
                        <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center">
                            <i class="fas fa-volume-up"></i>
                        </div>
                        <span class="font-bold tracking-tight">CodeWave</span>
                    </div>
                    
                    <div class="flex space-x-1 bg-slate-800 p-1 rounded-full">
                        ${[
                            { id: 'standard', icon: 'fas fa-headphones' },
                            { id: 'gym', icon: 'fas fa-running' },
                            { id: 'driving', icon: 'fas fa-car' }
                        ].map((mode) => `
                            <button 
                                onclick="appState.sceneMode='${mode.id}'; render();"
                                class="p-2 rounded-full transition-all ${appState.sceneMode === mode.id ? 'bg-indigo-500 text-white shadow-lg' : 'text-slate-500 hover:text-slate-300'}"
                            >
                                <i class="${mode.icon}"></i>
                            </button>
                        `).join('')}
                    </div>
                </div>

                <!-- 2. 主要内容区域 -->
                <div class="flex-1 flex flex-col relative overflow-y-auto">
                    
                    <!-- 动态背景效果 -->
                    <div class="absolute inset-0 pointer-events-none overflow-hidden">
                        <!-- 1. 呼吸光斑 -->
                        <div class="absolute top-0 left-0 w-full h-full transition-opacity duration-1000 ${appState.isPlaying ? 'opacity-30' : 'opacity-10'}">
                            <div class="absolute top-[-20%] left-[-20%] w-[80%] h-[80%] bg-indigo-600 rounded-full mix-blend-screen filter blur-[100px] transition-transform duration-[3000ms] ease-in-out ${appState.isPlaying ? 'scale-110 translate-x-10 translate-y-10' : 'scale-100'}"></div>
                            <div class="absolute bottom-[-20%] right-[-20%] w-[80%] h-[80%] bg-purple-600 rounded-full mix-blend-screen filter blur-[100px] transition-transform duration-[3000ms] ease-in-out ${appState.isPlaying ? 'scale-125 -translate-x-10 -translate-y-10' : 'scale-100'}"></div>
                        </div>

                        <!-- 2. 音频可视化器（仅播放时显示） -->
                        ${appState.isPlaying ? `
                            <div class="absolute inset-0 flex items-center justify-center opacity-20 z-0">
                                <div class="flex items-end gap-1 h-32">
                                    ${[0.4, 0.7, 0.3, 0.9, 0.5, 0.8, 0.4, 0.6, 0.2, 0.8].map((h, i) => `
                                        <div 
                                            class="w-3 bg-indigo-200 rounded-t-lg animate-pulse"
                                            style="height: ${h * 100}%; animation-duration: ${0.4 + (i * 0.1)}s; animation-delay: ${i * 0.05}s;"
                                        ></div>
                                    `).join('')}
                                </div>
                            </div>
                        ` : ''}
                    </div>

                    <!-- 内容视图 -->
                    <div class="z-10 flex-1 flex flex-col justify-center">
                        
                        <!-- 文章信息 -->
                        <div class="px-6 pt-6 pb-2 text-center">
                            <span class="text-xs font-bold tracking-wider text-indigo-400 uppercase mb-2 block">${appState.currentArticle.category}</span>
                            <h2 class="font-bold leading-tight mb-2 ${appState.sceneMode === 'driving' ? 'text-3xl' : 'text-2xl'}">
                                ${appState.currentArticle.title}
                            </h2>
                            <p class="text-slate-400 text-sm">${appState.currentArticle.author} • ${appState.currentArticle.duration}</p>
                        </div>

                        <!-- 动态文本/代码阅读器 -->
                        <div class="flex-1 flex items-center justify-center w-full px-2" id="player-content">
                            <!-- 内容将通过JS动态渲染 -->
                        </div>

                    </div>
                </div>

                <!-- 3. 代码处理快速切换（浮动） -->
                <div class="px-6 py-2 z-10">
                    <div class="bg-slate-800/80 backdrop-blur rounded-lg p-2 flex justify-between items-center border border-slate-700">
                        <span class="text-xs text-slate-400 font-mono flex items-center">
                            <i class="fas fa-cog mr-1 text-xs"></i> 代码处理策略
                        </span>
                        <div class="flex space-x-1">
                            ${[
                                { id: 'skip', label: '跳过' },
                                { id: 'label', label: '仅标注' },
                                { id: 'summary', label: 'AI摘要' }
                            ].map(opt => `
                                <button
                                    onclick="appState.codeMode='${opt.id}'; renderPlayerContent();"
                                    class="text-[10px] px-3 py-1.5 rounded transition-colors ${appState.codeMode === opt.id ? 'bg-indigo-600 text-white' : 'bg-slate-700 text-slate-400'}"
                                >
                                    ${opt.label}
                                </button>
                            `).join('')}
                        </div>
                    </div>
                </div>

                <!-- 4. 播放器控制 -->
                <div class="bg-slate-900 border-t border-slate-800 z-20 pb-6 pt-4 px-6 rounded-t-3xl shadow-2xl transition-all duration-300">
                    
                    <!-- 进度条 -->
                    <div class="mb-6 group cursor-pointer">
                        <div class="h-1.5 bg-slate-700 rounded-full overflow-hidden">
                            <div 
                                id="progress-bar"
                                class="h-full bg-gradient-to-r from-indigo-500 to-purple-500 relative" 
                                style="width: ${((appState.currentSegmentIndex / appState.currentArticle.segments.length) * 100) + (appState.progress / appState.currentArticle.segments.length)}%"
                            >
                                <div class="absolute right-0 top-1/2 -translate-y-1/2 w-2 h-2 bg-white rounded-full shadow-lg opacity-0 group-hover:opacity-100"></div>
                            </div>
                        </div>
                        <div class="flex justify-between text-[10px] text-slate-500 mt-1 font-mono">
                            <span>00:${appState.currentSegmentIndex}0</span>
                            <span>-${appState.currentArticle.duration}</span>
                        </div>
                    </div>

                    <!-- 控制按钮 -->
                    <div class="flex items-center justify-between">
                        
                        <!-- 速度切换 -->
                        <button 
                            onclick="appState.playbackSpeed = appState.playbackSpeed === 1 ? 1.5 : appState.playbackSpeed === 1.5 ? 2 : 1; render();"
                            class="text-xs font-bold text-slate-400 w-10 h-10 rounded-full border border-slate-700 flex items-center justify-center hover:bg-slate-800"
                        >
                            ${appState.playbackSpeed}x
                        </button>

                        <!-- 主要控制 -->
                        <div class="flex items-center space-x-6">
                            <button class="text-slate-400 hover:text-white transition" onclick="goToPreviousSegment()">
                                <i class="fas fa-step-backward text-2xl"></i>
                            </button>
                            
                            <button 
                                onclick="togglePlayPause()"
                                class="${getButtonSize()} bg-white rounded-full flex items-center justify-center text-slate-900 hover:scale-105 active:scale-95 transition-all shadow-lg shadow-indigo-500/20"
                            >
                                ${appState.isPlaying ? 
                                    '<i class="fas fa-pause text-2xl"></i>' : 
                                    '<i class="fas fa-play text-2xl ml-1"></i>'
                                }
                            </button>
                            
                            <button class="text-slate-400 hover:text-white transition" onclick="goToNextSegment()">
                                <i class="fas fa-step-forward text-2xl"></i>
                            </button>
                        </div>

                        <!-- 播放列表/菜单按钮 - 触发库视图 -->
                        <button 
                            onclick="appState.activeTab='library'; render();"
                            class="text-slate-400 hover:text-white transition w-10 flex justify-center hover:bg-slate-800 rounded-full p-2"
                        >
                            <i class="fas fa-layer-group text-xl"></i>
                        </button>
                    </div>
                    
                    <!-- 驾驶模式指示器 -->
                    ${appState.sceneMode === 'driving' ? `
                        <div class="mt-4 text-center">
                            <span class="text-xs text-green-500 flex items-center justify-center gap-1">
                                <i class="fas fa-car text-xs"></i> 蓝牙控制已连接 • 手势操作就绪
                            </span>
                        </div>
                    ` : ''}
                </div>
            `;
        };

        // 主渲染函数
        const render = () => {
            const appContainer = document.getElementById('app');
            
            // 根据场景模式更新容器样式
            appContainer.className = `w-full h-screen max-w-md mx-auto flex flex-col overflow-hidden font-sans ${getSceneStyles()}`;
            
            if (appState.activeTab === 'library') {
                appContainer.innerHTML = renderLibrary();
            } else {
                appContainer.innerHTML = renderPlayer();
                // 渲染初始内容
                renderPlayerContent();
            }
        };

        // 初始化应用
        document.addEventListener('DOMContentLoaded', () => {
            // 初始化Lucide图标
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }
            
            // 渲染应用
            render();
            
            // 将全局函数暴露给window
            window.appState = appState;
            window.handlePlayArticle = handlePlayArticle;
            window.togglePlayPause = togglePlayPause;
            window.goToPreviousSegment = goToPreviousSegment;
            window.goToNextSegment = goToNextSegment;
            window.render = render;
            window.renderPlayerContent = renderPlayerContent;
        });
    </script>
</body>
</html>
