<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Code 上下文工程解析</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
      background: #eef3ff;
    }

    .card {
      transition: .3s;
    }

    .card:hover {
      transform: translateY(-4px);
    }

    .section {
      display: none;
    }

    .section.active {
      display: block;
      animation: fade .4s;
    }

    @keyframes fade {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }
  </style>

</head>

<body class="flex flex-wrap justify-center gap-10 p-10 min-h-screen items-center">


</body>

</html>
