<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>爱牙看看 - 附近门诊</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <style>
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(circle at top left, #dbeafe 0%, #f8fafc 45%, #eef4ff 100%);
    }

    .glass {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid rgba(255, 255, 255, 0.3);
    }

    .card-shadow {
      box-shadow: 0 10px 40px rgba(96, 144, 255, 0.12), inset 0 1px 0 rgba(255, 255, 255, 0.6);
    }

    .gradient-blue {
      background: linear-gradient(135deg, #4f8cff 0%, #77a6ff 100%);
    }

    .gradient-green {
      background: linear-gradient(135deg, #5dc781 0%, #189448 100%);
    }

    .bottom-blur {
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    /* 诊所卡片悬停效果 */
    .clinic-card {
      transition: all 0.3s ease;
    }

    .clinic-card:active {
      transform: scale(0.98);
    }

    /* 评分星星 */
    .star-filled {
      color: #f59e0b;
    }

    .star-empty {
      color: #d1d5db;
    }

    /* 地图大头针脉冲 */
    @keyframes pulse-dot {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: 0.7;
        transform: scale(1.3);
      }
    }

    .map-pin-pulse {
      animation: pulse-dot 2s ease-in-out infinite;
    }
  </style>
</head>

<body class="flex flex-wrap justify-center gap-10 p-10 min-h-screen items-center">

  <!-- ================= 附近门诊 ================= -->
  <div
    class="relative w-[375px] h-[812px] bg-gray-50 rounded-[40px] shadow-2xl overflow-hidden border-[8px] border-gray-900 box-border flex flex-col">

    <!-- iOS 状态栏 -->
    <div class="h-12 w-full flex justify-between items-end px-6 pb-2 z-50 absolute top-0 left-0">
      <span class="text-black text-sm font-semibold">9:41</span>
      <div class="flex gap-1.5 items-center">
        <i class="ri-signal-wifi-fill text-black text-sm"></i>
        <i class="ri-battery-charge-fill text-black text-sm"></i>
      </div>
    </div>
    <!-- 顶部导航栏 -->
    <div class="pt-11 bg-white  glass-header px-4 py-3 border-b border-blue-100/30 flex-shrink-0">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
          <i
            class="ri-arrow-left-s-line text-2xl text-gray-800 cursor-pointer active:scale-90 transition-transform"></i>
          <h1 class="text-lg font-bold text-gray-900 tracking-tight">我的门诊</h1>
        </div>
        <!-- <div class="flex items-center gap-3">
            <i class="ri-search-line text-xl text-gray-500 cursor-pointer active:scale-90 transition-transform"></i>
            <i class="ri-filter-3-line text-xl text-gray-500 cursor-pointer active:scale-90 transition-transform"></i>
          </div> -->
      </div>
    </div>
    <!-- 快捷筛选标签 -->
    <div class="flex gap-2 px-5 py-3 bg-white border-b border-gray-100 overflow-x-auto no-scrollbar">
      <span class="shrink-0 px-3.5 py-1.5 rounded-full bg-blue-500 text-white text-xs font-medium"><i
          class="ri-navigation-line text-sm"></i>全部</span>
      <span class="shrink-0 px-3.5 py-1.5 rounded-full bg-gray-100 text-gray-600 text-xs font-medium"><i
          class="ri-navigation-line text-sm"></i>全科</span>
      <span class="shrink-0 px-3.5 py-1.5 rounded-full bg-gray-100 text-gray-600 text-xs font-medium"><i
          class="ri-navigation-line text-sm"></i>口腔检查</span>
      <span class="shrink-0 px-3.5 py-1.5 rounded-full bg-gray-100 text-gray-600 text-xs font-medium"><i
          class="ri-navigation-line text-sm"></i>洁牙美白</span>
      <span class="shrink-0 px-3.5 py-1.5 rounded-full bg-gray-100 text-gray-600 text-xs font-medium"><i
          class="ri-navigation-line text-sm"></i>牙齿矫正</span>
      <span class="shrink-0 px-3.5 py-1.5 rounded-full bg-gray-100 text-gray-600 text-xs font-medium"><i
          class="ri-navigation-line text-sm"></i>也吃治疗</span>
      <span class="shrink-0 px-3.5 py-1.5 rounded-full bg-gray-100 text-gray-600 text-xs font-medium"><i
          class="ri-navigation-line text-sm"></i>儿童牙齿</span>
      <span class="shrink-0 px-3.5 py-1.5 rounded-full bg-gray-100 text-gray-600 text-xs font-medium"><i
          class="ri-navigation-line text-sm"></i>烤瓷牙</span>
      <span class="shrink-0 px-3.5 py-1.5 rounded-full bg-gray-100 text-gray-600 text-xs font-medium"><i
          class="ri-navigation-line text-sm"></i>其他</span>
    </div>

    <div class="flex-1 overflow-y-auto no-scrollbar bg-gray-50/80 pb-24">

      <div class="px-5 py-4 space-y-4">

        <!-- ===== 诊所卡片 ===== -->
        <div class="clinic-card bg-white rounded-2xl p-4 shadow-sm border border-gray-100 cursor-pointer">
          <div class="flex items-start justify-between">
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2">
                <img src="./校徽.png" class="w-[58px] h-[58px] rounded-[16px]" />
                <h3 class="text-base font-bold text-gray-900 truncate">珠海口腔</h3>
              </div>
            </div>
            <div class="shrink-0 text-right ml-3">
              <div class="text-xs text-blue-500 font-semibold flex items-center gap-0.5 justify-end">
                <i class="ri-map-pin-line text-[14px]"></i> 1.2km
              </div>
              <!-- <div class="mt-1 px-2 py-0.5 rounded-full bg-blue-50 text-blue-500 text-[10px] font-medium">营业中</div> -->
            </div>
          </div>
          <div class="flex items-start gap-1.5 mt-2.5 text-xs text-gray-500">
            <i class="ri-map-pin-line text-gray-300 mt-0.5"></i>
            <span class="flex-1 truncate">珠海高新区格床新股</span>
          </div>
          <div class="flex items-center gap-1.5 mt-1.5 text-xs text-gray-500">
            <i class="ri-phone-line text-gray-300"></i>
            <span>xxx-XXXX-xxxx</span>
          </div>
          <div class="flex items-center gap-1.5 mt-1.5 text-xs text-gray-500">
            <i class="ri-user-line text-gray-300"></i>
            <span>李医生</span>
          </div>
          <!-- 操作按钮 -->
          <div class="flex items-center gap-2 mt-3 pt-3 border-t border-gray-50">
            <button
              class="flex-1 h-9 rounded-full gradient-blue text-white text-xs font-medium shadow-sm shadow-blue-200">
              <i class="ri-phone-line text-gray-300 mr-2"></i> 立即预约
            </button>
            <button
              class="flex-1 h-9 rounded-full gradient-green text-white text-xs font-medium shadow-sm shadow-green-200">
              <i class="ri-phone-line text-gray-300 mr-2"></i>立即咨询
            </button>
            <!-- <button class="w-9 h-9 rounded-full border border-gray-200 flex items-center justify-center text-gray-400">
              <i class="ri-phone-line text-sm"></i>
            </button>
            <button class="w-9 h-9 rounded-full border border-gray-200 flex items-center justify-center text-gray-400">
              <i class="ri-navigation-line text-sm"></i>
            </button> -->
          </div>
        </div>

      </div>


    </div>

    <!-- 底部导航栏 -->
    <div class="absolute bottom-0 w-full glass h-[88px] flex justify-around items-start pt-4 z-50">
      <div class="flex flex-col items-center gap-1 cursor-pointer opacity-40">
        <i class="ri-home-5-fill text-black text-2xl"></i>
        <span class="text-black text-[10px] font-medium">首页</span>
      </div>
      <div class="flex flex-col items-center gap-1 cursor-pointer">
        <i class="ri-robot-line text-blue-600 text-2xl"></i>
        <span class="text-blue-600 text-[10px] font-medium">爱牙</span>
      </div>
      <div class="flex flex-col items-center gap-1 cursor-pointer">
        <i class="ri-text-line text-blue-600 text-2xl"></i>
        <span class="text-blue-600 text-[16px] font-medium">门店</span>
      </div>
      <div class="flex flex-col items-center gap-1 cursor-pointer opacity-40">
        <i class="ri-shopping-bag-3-line text-black text-2xl"></i>
        <span class="text-black text-[10px] font-medium">健康</span>
      </div>
      <div class="flex flex-col items-center gap-1 cursor-pointer opacity-40">
        <i class="ri-user-3-line text-black text-2xl"></i>
        <span class="text-black text-[10px] font-medium">我的</span>
      </div>
    </div>

    <!-- Home Indicator -->
    <div class="absolute bottom-2 left-1/2 transform -translate-x-1/2 w-32 h-1 bg-black rounded-full z-50"></div>
  </div>

</body>

</html>
