<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>爱牙看看 - UI设计方案</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, #dbeafe 0%, #f8fafc 45%, #eef4ff 100%);
    }

    .glass {
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .card-shadow {
      box-shadow:
        0 10px 40px rgba(96, 144, 255, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.6);
    }

    .soft-shadow {
      box-shadow:
        0 6px 30px rgba(59, 130, 246, 0.08);
    }

    .tab-active {
      background: linear-gradient(135deg, #4f8cff 0%, #7aa8ff 100%);
      color: white;
      box-shadow: 0 8px 20px rgba(79, 140, 255, 0.25);
    }

    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .gradient-blue {
      background: linear-gradient(135deg, #a5c8f7 0%, #dfeaff 45%, #f8fbff 100%);
    }

    .gradient-btn {
      background: linear-gradient(135deg, #4f8cff 0%, #77a6ff 100%);
    }

    .bottom-blur {
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
  </style>
</head>

<body class="flex gap-14 flex-wrap justify-center items-center min-h-screen p-10">

  <!-- ======================= 首页 ======================= -->
  <div
    class="relative w-[375px] h-[812px] bg-[#f7faff] rounded-[42px] overflow-hidden border-[8px] border-black shadow-2xl flex flex-col">

    <!-- 状态栏 -->
    <div class="absolute top-0 left-0 z-50 w-full h-11 flex justify-between items-end px-6 pb-1.5">
      <span class="text-black text-sm font-semibold">9:41</span>
      <div class="flex items-center gap-1">
        <i class="ri-signal-wifi-fill text-black text-sm"></i>
        <i class="ri-battery-charge-fill text-black text-sm"></i>
      </div>
    </div>

    <!-- 用户卡片 -->
    <div class="mx-5 mt-12 rounded-[30px] py-4 px-5 gradient-blue card-shadow relative overflow-hidden">
      <div class="absolute -right-8 -bottom-8 w-40 h-40 rounded-full bg-blue-400/40 blur-2xl"></div>
      <div class="flex items-center justify-between relative z-10">
        <div class="flex items-center gap-4">
          <img src="./avatar.png" class="w-20 h-20 rounded-full object-cover shadow-lg" />
          <div>
            <div class="flex items-center flex-col gap-2">
              <h2 class="text-xl font-bold text-black">王星</h2>
              <div class="px-2 py-0.5 rounded-full text-[10px] font-semibold bg-white/70 text-black">
                LV1
              </div>
            </div>
          </div>
        </div>
        <div class="text-right">
          <div class="text-sm text-black/45">积分</div>
          <div class="text-[22px] font-bold text-blue-500 mt-0.5">90</div>
        </div>
      </div>
    </div>

    <!-- 功能区 -->
    <div class="mt-5 px-5 flex-1 overflow-hidden">
      <div class="glass rounded-[24px] p-2 card-shadow ">
        <!-- 功能模块 -->
        <div class="space-y-1">
          <!-- item -->
          <div
            class="flex items-center justify-between px-2 py-3 rounded-3xl hover:bg-white/70 transition-all duration-300">
            <div class="flex items-center gap-4">
              <div
                class="w-12 h-12 rounded-full bg-gradient-to-br from-cyan-100 to-emerald-100 flex items-center justify-center">
                <i class="ri-shield-user-line text-2xl text-black"></i>
              </div>
              <div>
                <div class="font-semibold text-black">账号与安全</div>
                <div class="text-sm text-black/35 mt-1">修改密码、绑定手机等</div>
              </div>
            </div>
            <i class="ri-arrow-right-s-line text-2xl text-black/25"></i>
          </div>
          <div class="border-t border-black/5"></div>
          <!-- item -->
          <div
            class="flex items-center justify-between px-2 py-3 rounded-3xl hover:bg-white/70 transition-all duration-300">
            <div class="flex items-center gap-4">
              <div
                class="w-12 h-12 rounded-full bg-gradient-to-br from-violet-100 to-purple-100 flex items-center justify-center">
                <i class="ri-home-heart-line text-2xl text-black"></i>
              </div>
              <div>
                <div class="font-semibold text-black">家庭管理</div>
                <div class="text-sm text-black/35 mt-1">管理家庭成员与设备</div>
              </div>
            </div>
            <i class="ri-arrow-right-s-line text-2xl text-black/25"></i>
          </div>
          <div class="border-t border-black/5"></div>
          <!-- item -->
          <div
            class="flex items-center justify-between px-2 py-3 rounded-3xl hover:bg-white/70 transition-all duration-300">
            <div class="flex items-center gap-4">
              <div
                class="w-12 h-12 rounded-full bg-gradient-to-br from-blue-100 to-sky-100 flex items-center justify-center">
                <i class="ri-bluetooth-connect-line text-2xl text-black"></i>
              </div>
              <div>
                <div class="font-semibold text-black">我的设备</div>
                <div class="text-sm text-black/35 mt-1">查看与管理智能设备</div>
              </div>
            </div>
            <i class="ri-arrow-right-s-line text-2xl text-black/25"></i>
          </div>
          <div class="border-t border-black/5"></div>
          <!-- item -->
          <div
            class="flex items-center justify-between px-2 py-3 rounded-3xl hover:bg-white/70 transition-all duration-300">
            <div class="flex items-center gap-4">

              <div
                class="w-12 h-12 rounded-full bg-gradient-to-br from-sky-100 to-blue-50 flex items-center justify-center">
                <i class="ri-brush-line text-2xl text-black"></i>
              </div>
              <div>
                <div class="font-semibold text-black">智能牙刷</div>
                <div class="text-sm text-black/35 mt-1">设备设置与使用指南</div>
              </div>
            </div>
            <i class="ri-arrow-right-s-line text-2xl text-black/25"></i>
          </div>
          <div class="border-t border-black/5"></div>

          <!-- item -->
          <div
            class="flex items-center justify-between px-2 py-3 rounded-3xl hover:bg-white/70 transition-all duration-300">
            <div class="flex items-center gap-4">
              <div
                class="w-12 h-12 rounded-full bg-gradient-to-br from-orange-100 to-amber-100 flex items-center justify-center">
                <i class="ri-gift-line text-2xl text-black"></i>
              </div>
              <div>
                <div class="font-semibold text-black">邀请返利</div>
                <div class="text-sm text-black/35 mt-1">邀请好友赚取积分奖励</div>
              </div>
            </div>
            <i class="ri-arrow-right-s-line text-2xl text-black/25"></i>
          </div>
          <div class="border-t border-black/5"></div>

          <!-- item -->
          <div
            class="flex items-center justify-between px-2 py-3 rounded-3xl hover:bg-white/70 transition-all duration-300">
            <div class="flex items-center gap-4">
              <div
                class="w-12 h-12 rounded-full bg-gradient-to-br from-pink-100 to-rose-100 flex items-center justify-center">
                <i class="ri-customer-service-2-line text-2xl text-black"></i>
              </div>
              <div>
                <div class="font-semibold text-black">我的咨询</div>
                <div class="text-sm text-black/35 mt-1">查看咨询记录与医生回复</div>
              </div>
            </div>
            <i class="ri-arrow-right-s-line text-2xl text-black/25"></i>
          </div>

        </div>
      </div>
    </div>

    <!-- 底部导航栏 -->
    <div class="absolute bottom-0 w-full glass h-[88px] flex justify-around items-start pt-4 z-50">
      <div class="flex flex-col items-center gap-1 cursor-pointer opacity-40">
        <i class="ri-home-5-fill text-black text-2xl"></i>
        <span class="text-black text-[10px] font-medium">首页</span>
      </div>
      <div class="flex flex-col items-center gap-1 cursor-pointer  opacity-40">
        <i class="ri-robot-line text-black text-2xl"></i>
        <span class="text-black-600 text-[10px] font-medium">爱牙</span>
      </div>
      <div class="flex flex-col items-center gap-1 cursor-pointer ">
        <i class="ri-text-line text-blue-600 text-2xl"></i>
        <span class="text-blue-600 text-[16px] font-medium">爱牙博士</span>
      </div>
      <div class="flex flex-col items-center gap-1 cursor-pointer opacity-40">
        <i class="ri-shopping-bag-3-line text-black text-2xl"></i>
        <span class="text-black text-[10px] font-medium">健康</span>
      </div>
      <div class="flex flex-col items-center gap-1 cursor-pointer">
        <i class="ri-user-3-line text-blue-600 text-2xl"></i>
        <span class="text-blue-600 text-[10px] font-medium">我的</span>
      </div>
    </div>


  </div>

</body>

</html>
