<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>爱牙博士 - AI口腔助手</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <style>
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f3f4f6;
    }

    .g-bg {
      position: relative;
      width: 100vw;
      height: 100vh;

      &>div {
        position: absolute;
        opacity: .5;
      }

      &::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        bottom: 0;
        right: 0;
        backdrop-filter: blur(150px);
        z-index: 1;
      }
    }

    .g-polygon-1 {
      bottom: 100px;
      left: 48%;
      transform: translate(-50%, 0);
      width: 1100px;
      height: 590px;
      background: linear-gradient(#77f8c210, #32f5b425);
      clip-path: polygon(0 10%, 30% 0, 100% 40%, 70% 100%, 20% 90%);
    }

    .g-polygon-2 {
      bottom: 80px;
      left: 20%;
      transform: translate(-50%, 0);
      width: 800px;
      height: 550px;
      background: linear-gradient(-36deg, #e9f17f18, #f5f2217a);
      clip-path: polygon(10% 0, 100% 70%, 100% 100%, 20% 90%);
    }

    .g-polygon-3 {
      bottom: 140px;
      left: 60%;
      transform: translate(-50%, 0);
      width: 1000px;
      height: 550px;
      background: rgba(50, 250, 50, 0.164);
      clip-path: polygon(80% 0, 100% 70%, 100% 100%, 20% 90%);
    }
  </style>
</head>

<body class="flex flex-wrap justify-center gap-10 p-10 min-h-screen items-center">

  <div
    class="relative bg-white rounded-[40px] shadow-2xl overflow-hidden border-[8px] border-gray-900 box-border flex flex-col">

    <!-- iOS 状态栏 -->
    <div class="h-11 w-full flex justify-between items-end px-6 pb-1.5 z-50 absolute top-0 left-0">
      <span class="text-black text-sm font-semibold">9:41</span>
      <div class="flex gap-1.5 items-center">
        <i class="ri-signal-wifi-fill text-black text-sm"></i>
        <i class="ri-battery-charge-fill text-black text-sm"></i>
      </div>
    </div>

    <div class="g-bg">
      <div class="g-polygon-1"></div>
      <div class="g-polygon-2"></div>
      <div class="g-polygon-3"></div>
    </div>

  </div>

</body>

</html>
