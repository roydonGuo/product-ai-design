<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家庭可视牙刷 App UI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <style>
    /* 隐藏滚动条但允许滚动 */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* 模拟 iOS 字体 */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f3f4f6;
    }

    /* 玻璃拟态 */
    .glass {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid rgba(255, 255, 255, 0.3);
    }

    /* 渐变文字 */
    .text-gradient {
      background: linear-gradient(135deg, #2563EB, #60A5FA);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
  </style>
</head>

<body class="flex flex-wrap justify-center gap-10 p-10 min-h-screen items-center">

  <!-- ================= 手机: 刷牙详情页 (Detail) ================= -->
  <div
    class="relative w-[375px] h-[812px] bg-white rounded-[40px] shadow-2xl overflow-hidden border-[8px] border-gray-900 box-border flex flex-col">

    <!-- iOS 状态栏 (透明背景覆盖在视频上) -->
    <div class="h-12 w-full flex justify-between items-end px-6 pb-2 z-50 absolute top-0 left-0">
      <span class="text-white text-sm font-semibold drop-shadow-md">9:42</span>
      <div class="flex gap-1.5 items-center">
        <i class="ri-signal-wifi-fill text-white drop-shadow-md text-sm"></i>
        <i class="ri-battery-charge-fill text-white drop-shadow-md text-sm"></i>
      </div>
    </div>

    <!-- 顶部导航 -->
    <div class="absolute top-12 left-0 w-full px-4 z-50 flex justify-between items-center pt-2">
      <div class="w-10 h-10 rounded-full bg-black/20 backdrop-blur-md flex items-center justify-center">
        <i class="ri-arrow-left-line text-white text-xl"></i>
      </div>
      <div class="px-4 py-1.5 rounded-full bg-black/20 backdrop-blur-md border border-white/10">
        <span class="text-white text-xs font-medium flex items-center gap-1">
          <div class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></div>
          设备已连接
        </span>
      </div>
      <div class="w-10 h-10 rounded-full bg-black/20 backdrop-blur-md flex items-center justify-center">
        <i class="ri-more-fill text-white text-xl"></i>
      </div>
    </div>

    <!-- 全屏视频背景模拟 -->
    <div class="absolute inset-0 z-0">
      <!-- <img
        src="https://images.unsplash.com/photo-1606811971618-4486d14f3f99?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80"
        alt="Mouth Camera" class="w-full h-full object-cover"> -->
      <!-- 遮罩层，让文字更清晰 -->
      <div class="absolute inset-0 bg-gradient-to-b from-black/40 via-transparent to-black/60"></div>
    </div>

    <!-- AR 引导层 (模拟) -->
    <div class="absolute inset-0 z-10 flex items-center justify-center pointer-events-none">
      <!-- 牙齿轮廓模拟 -->
      <div class="w-[80%] h-[60%] border-2 border-white/30 rounded-[3rem] relative">
        <!-- 重点清洁区域高亮 -->
        <!-- <div class="absolute top-10 right-8 w-12 h-12 bg-red-500/40 rounded-full blur-md animate-pulse"></div>
        <div
          class="absolute top-10 right-10 w-3 h-3 bg-white border-2 border-red-500 rounded-full flex items-center justify-center">
          <span class="text-[8px] text-red-500 font-bold">!</span>
        </div> -->
      </div>
    </div>

    <div>
      <!-- 语音教练提示 -->
      <div class="mt-24 flex justify-center">
        <div class="bg-black/40 backdrop-blur-xl px-6 py-2 rounded-2xl border border-white/10 flex items-center gap-3">
          <i class="ri-volume-up-fill text-blue-400"></i>
          <span class="text-white text-sm font-medium">当前正在刷右上/右下/左上/左下区域！</span>
        </div>
      </div>
    </div>

    <!-- 底部操作面板 -->
    <div class="relative z-20 mt-auto pb-12 px-6">

      <!-- 计时器 -->
      <div class="flex justify-center" style="margin-bottom: -3rem;">
        <div class="relative w-48 h-12 flex items-center justify-center">
          <!-- 时间文字 -->
          <div class="absolute flex flex-col items-center">
            <span class="text-white text-5xl font-bold tracking-tighter">01:45</span>
            <span class="text-gray-300 text-xs mt-2 uppercase tracking-widest">本次刷牙时长</span>
          </div>
        </div>
      </div>

      <!-- 控制按钮组 -->
      <div class="flex items-center justify-between px-4">
        <!-- 截图 -->
        <div class="flex flex-col items-center gap-2">
          <button
            class="w-12 h-12 rounded-full bg-white/40 backdrop-blur-md flex items-center justify-center border border-white/20 active:bg-white/20">
            <i class="ri-camera-line text-white text-xl"></i>
          </button>
          <span class="text-white/60 text-[10px]">截图</span>
        </div>

        <!-- 暂停/结束 -->
        <!-- <button
          class="w-20 h-20 rounded-full bg-white flex items-center justify-center shadow-lg shadow-white/20 active:scale-95 transition-transform">
          <i class="ri-pause-fill text-black text-4xl"></i>
        </button> -->

        <!-- 录像 -->
        <div class="flex flex-col items-center gap-2">
          <button
            class="w-12 h-12 rounded-full bg-white/80 backdrop-blur-md flex items-center justify-center border border-white/20 active:bg-white/20">
            <i class="ri-record-circle-line text-red-500 text-xl"></i>
          </button>
          <span class="text-white/60 text-[10px]">录像</span>
        </div>
      </div>
    </div>

    <!-- Home Indicator -->
    <div class="absolute bottom-2 left-1/2 transform -translate-x-1/2 w-32 h-1 bg-white rounded-full z-50"></div>
  </div>

</body>

</html>
