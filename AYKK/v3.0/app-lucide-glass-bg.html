<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>爱牙看看 - 渐变背景</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <style>
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    /* ====== 渐变背景容器 ====== */
    .g-bg {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    /* 渐变基底：上 → 下 清晰过渡，顶部显色、底部纯白 */
    .g-base {
      position: absolute;
      inset: 0;
      background:
        /* 光晕点缀层（叠加在上方增加色彩氛围） */
        radial-gradient(ellipse 600px 400px at 20% 8%, rgba(14, 165, 233, 0.08) 0%, transparent 100%),
        radial-gradient(ellipse 400px 300px at 75% 12%, rgba(20, 184, 166, 0.05) 0%, transparent 100%),
        radial-gradient(ellipse 300px 280px at 50% 35%, rgba(56, 189, 248, 0.04) 0%, transparent 100%),
        radial-gradient(ellipse 250px 250px at 25% 65%, rgba(129, 140, 248, 0.02) 0%, transparent 100%),
        /* 基底：自上而下渐变，顶部淡蓝、底部纯白 */
        linear-gradient(180deg,
          #e8f2ff 0%,
          #eef6ff 15%,
          #f4faf8 35%,
          #f8fbf6 55%,
          #fbfcfa 75%,
          #f5f5f5 100%);
    }

    /* 光晕 1 — 极淡医疗蓝 */
    .g-glow-1 {
      position: absolute;
      width: 520px;
      height: 520px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 40%, rgba(56, 189, 248, 0.12), transparent 70%);
      top: -170px;
      right: -90px;
      filter: blur(55px);
    }

    /* 光晕 2 — 极淡清新青（弱化，避免影响下半部） */
    .g-glow-2 {
      position: absolute;
      width: 460px;
      height: 460px;
      border-radius: 50%;
      background: radial-gradient(circle at 55% 45%, rgba(45, 212, 191, 0.04), transparent 72%);
      bottom: -140px;
      left: -100px;
      filter: blur(60px);
    }

    /* 光晕 3 — 极淡薄荷绿（上移，避免沉积底部） */
    .g-glow-3 {
      position: absolute;
      width: 340px;
      height: 340px;
      border-radius: 50%;
      background: radial-gradient(circle at 50% 50%, rgba(52, 211, 153, 0.06), transparent 70%);
      top: 28%;
      left: 58%;
      filter: blur(50px);
    }

    /* 光晕 4 — 极淡淡紫（弱化，避免影响下半部） */
    .g-glow-4 {
      position: absolute;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      background: radial-gradient(circle at 50% 50%, rgba(129, 140, 248, 0.03), transparent 70%);
      bottom: 22%;
      right: 8%;
      filter: blur(48px);
    }

    /* 光晕 5 — 中心微光 */
    .g-glow-5 {
      position: absolute;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(14, 165, 233, 0.03), transparent 70%);
      top: 22%;
      left: 18%;
      filter: blur(40px);
    }

    /* 微笑弧线 — 极淡 */
    .g-arc {
      position: absolute;
      bottom: 16%;
      left: 50%;
      transform: translateX(-50%) scaleX(1.3);
      width: 220px;
      height: 100px;
      border-bottom: 1.5px solid rgba(14, 165, 233, 0.05);
      border-radius: 0 0 50% 50%;
      pointer-events: none;
    }

    .g-arc-2 {
      position: absolute;
      bottom: 15%;
      left: 50%;
      transform: translateX(-50%) scaleX(1.5);
      width: 180px;
      height: 80px;
      border-bottom: 1px solid rgba(20, 184, 166, 0.03);
      border-radius: 0 0 50% 50%;
      pointer-events: none;
    }

    /* 粒子点缀 */
    .g-dot {
      position: absolute;
      border-radius: 50%;
      filter: blur(1.5px);
      pointer-events: none;
    }

    /* 玻璃蒙层 */
    .g-glass {
      position: absolute;
      inset: 0;
      backdrop-filter: blur(100px);
      -webkit-backdrop-filter: blur(100px);
      z-index: 1;
    }

    /* 页面级氛围 — 极淡 */
    .page-glow {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 800px 600px at 20% 30%, rgba(56, 189, 248, 0.03) 0%, transparent 100%),
        radial-gradient(ellipse 600px 800px at 80% 70%, rgba(45, 212, 191, 0.02) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }
  </style>
</head>

<body class="min-h-screen flex flex-wrap justify-center gap-10 p-10 items-center relative bg-[#fafcff]">

  <!-- 页面级氛围光晕 -->
  <div class="page-glow"></div>

  <!-- ====== 手机壳（展示渐变背景效果） ====== -->
  <div id="phoneFrame"
    class="relative rounded-[44px] shadow-2xl overflow-hidden border-[7px] border-gray-900 box-border flex flex-col w-[390px] h-[844px] bg-white/30 z-10 transition-colors duration-500">

    <!-- iOS 状态栏 -->
    <div id="statusBar"
      class="h-11 w-full flex justify-between items-end px-7 pb-1.5 z-50 absolute top-0 left-0 transition-opacity duration-500">
      <span class="text-black text-sm font-semibold">9:41</span>
      <div class="flex gap-1.5 items-center">
        <i class="ri-signal-wifi-fill text-black text-sm"></i>
        <i class="ri-battery-charge-fill text-black text-sm"></i>
      </div>
    </div>

    <!-- 渐变背景 -->
    <div class="g-bg h-full">
      <div class="g-base"></div>
      <div class="g-glow-1"></div>
      <div class="g-glow-2"></div>
      <div class="g-glow-3"></div>
      <div class="g-glow-4"></div>
      <div class="g-glow-5"></div>

      <!-- 微笑弧线 -->
      <div class="g-arc"></div>
      <div class="g-arc-2"></div>

      <!-- 粒子点缀 -->
      <div class="g-dot w-[4px] h-[4px] top-[14%] left-[11%]" style="background: rgba(56,189,248,0.08)"></div>
      <div class="g-dot w-[3px] h-[3px] top-[26%] right-[15%]" style="background: rgba(20,184,166,0.06)"></div>
      <div class="g-dot w-[5px] h-[5px] top-[62%] left-[7%]" style="background: rgba(129,140,248,0.05)"></div>
      <div class="g-dot w-[3px] h-[3px] top-[78%] right-[22%]" style="background: rgba(52,211,153,0.06)"></div>
      <div class="g-dot w-[4px] h-[4px] top-[45%] right-[12%]" style="background: rgba(56,189,248,0.05)"></div>
      <div class="g-dot w-[3px] h-[3px] top-[55%] left-[20%]" style="background: rgba(20,184,166,0.04)"></div>

      <!-- 玻璃蒙层 -->
      <div class="g-glass"></div>
    </div>

    <!-- ====== 示例内容 (展示背景之上的 UI) ====== -->
    <div id="phoneContent" class="absolute inset-0 z-10 flex flex-col px-5 pt-14 pb-5 transition-opacity duration-500">

      <!-- 顶部导航 -->
      <div class="flex justify-between items-center mb-7">
        <div>
          <h1 class="text-xl font-bold text-gray-800">爱牙看看</h1>
          <p class="text-[11px] text-gray-400 mt-0.5 tracking-wide">您的口腔健康助手</p>
        </div>
        <div class="w-9 h-9 rounded-full bg-white/60 backdrop-blur-lg flex items-center justify-center shadow-sm
                    border border-white/40">
          <i class="ri-user-line text-base" style="color: #0EA5E9"></i>
        </div>
      </div>

      <!-- 搜索栏 -->
      <div class="bg-white/65 backdrop-blur-xl rounded-2xl px-4 py-3 flex items-center gap-3 shadow-sm
                  border border-white/40 mb-6">
        <i class="ri-search-line text-gray-400 text-sm"></i>
        <input type="text" placeholder="搜索症状、疾病、治疗方案..."
          class="bg-transparent outline-none text-sm flex-1 text-gray-600 placeholder:text-gray-300">
        <i class="ri-scan-2-line text-gray-300 text-sm"></i>
      </div>

      <!-- Banner 推荐位 -->
      <div class="rounded-2xl overflow-hidden mb-6 relative shadow-sm">
        <div class="absolute inset-0 bg-gradient-to-r from-blue-500/80 to-cyan-400/70 backdrop-blur-sm"></div>
        <div class="relative px-5 py-4 flex items-center justify-between">
          <div>
            <p class="text-white text-sm font-semibold">🦷 口腔健康月</p>
            <p class="text-white/80 text-[11px] mt-1">免费领取口腔检查套餐</p>
          </div>
          <button
            class="text-xs font-medium text-blue-600 bg-white/90 backdrop-blur-md px-3.5 py-1.5 rounded-full shadow-sm">
            立即参与
          </button>
        </div>
      </div>

      <!-- 功能快捷入口 -->
      <div class="grid grid-cols-2 gap-3.5">
        <!-- 口腔自查 -->
        <div class="bg-white/65 backdrop-blur-xl rounded-2xl p-4 shadow-sm border border-white/40
                    hover:bg-white/75 transition-all duration-300">
          <div class="w-10 h-10 rounded-xl flex items-center justify-center mb-3"
            style="background: linear-gradient(135deg, rgba(14,165,233,0.15), rgba(56,189,248,0.08))">
            <i class="ri-search-eye-line text-xl" style="color: #0EA5E9"></i>
          </div>
          <p class="text-sm font-semibold text-gray-800">口腔自查</p>
          <p class="text-[11px] text-gray-400 mt-0.5">AI 智能识别</p>
        </div>

        <!-- 健康刷牙 -->
        <div class="bg-white/65 backdrop-blur-xl rounded-2xl p-4 shadow-sm border border-white/40
                    hover:bg-white/75 transition-all duration-300">
          <div class="w-10 h-10 rounded-xl flex items-center justify-center mb-3"
            style="background: linear-gradient(135deg, rgba(20,184,166,0.15), rgba(45,212,191,0.08))">
            <i class="ri-tooth-line text-xl" style="color: #14B8A6"></i>
          </div>
          <p class="text-sm font-semibold text-gray-800">健康刷牙</p>
          <p class="text-[11px] text-gray-400 mt-0.5">科学刷牙指导</p>
        </div>

        <!-- 在线问诊 -->
        <div class="bg-white/65 backdrop-blur-xl rounded-2xl p-4 shadow-sm border border-white/40
                    hover:bg-white/75 transition-all duration-300">
          <div class="w-10 h-10 rounded-xl flex items-center justify-center mb-3"
            style="background: linear-gradient(135deg, rgba(129,140,248,0.15), rgba(167,139,250,0.08))">
            <i class="ri-mental-health-line text-xl" style="color: #818CF8"></i>
          </div>
          <p class="text-sm font-semibold text-gray-800">在线问诊</p>
          <p class="text-[11px] text-gray-400 mt-0.5">专业医生解答</p>
        </div>

        <!-- 健康记录 -->
        <div class="bg-white/65 backdrop-blur-xl rounded-2xl p-4 shadow-sm border border-white/40
                    hover:bg-white/75 transition-all duration-300">
          <div class="w-10 h-10 rounded-xl flex items-center justify-center mb-3"
            style="background: linear-gradient(135deg, rgba(52,211,153,0.15), rgba(16,185,129,0.08))">
            <i class="ri-file-chart-line text-xl" style="color: #34D399"></i>
          </div>
          <p class="text-sm font-semibold text-gray-800">健康记录</p>
          <p class="text-[11px] text-gray-400 mt-0.5">历史数据分析</p>
        </div>
      </div>

      <!-- 底部 Tab Bar (示意) -->
      <div class="mt-auto pt-4">
        <div class="bg-white/60 backdrop-blur-xl rounded-2xl px-5 py-2.5 flex justify-between items-center
                    border border-white/40 shadow-sm">
          <i class="ri-home-5-line text-lg" style="color: #0EA5E9"></i>
          <i class="ri-compass-3-line text-lg text-gray-300"></i>
          <i class="ri-calendar-line text-lg text-gray-300"></i>
          <i class="ri-user-line text-lg text-gray-300"></i>
        </div>
      </div>

    </div>
  </div>

  <!-- ====== 控制按钮 ====== -->
  <button id="togglePreview"
    class="fixed top-6 right-6 z-30 flex items-center gap-2 px-4 py-2 rounded-full text-sm transition-all duration-300 shadow-md border"
    style="background: rgba(255,255,255,0.75); backdrop-filter: blur(12px); border-color: rgba(255,255,255,0.5); color: #475569;">
    <i class="ri-eye-line text-base"></i>
    <span id="toggleLabel">仅看背景</span>
  </button>

  <!-- ====== 配色说明 ====== -->
  <div id="colorBar" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-20 transition-opacity duration-300">
    <div
      class="bg-white/75 backdrop-blur-lg rounded-full px-5 py-2 shadow-lg border border-white/50 text-xs text-gray-500 flex items-center gap-4">
      <span class="flex items-center gap-1.5"><span class="w-2.5 h-2.5 rounded-full" style="background:#0EA5E9"></span>
        医疗蓝</span>
      <span class="flex items-center gap-1.5"><span class="w-2.5 h-2.5 rounded-full" style="background:#14B8A6"></span>
        清新青</span>
      <span class="flex items-center gap-1.5"><span class="w-2.5 h-2.5 rounded-full" style="background:#34D399"></span>
        薄荷绿</span>
      <span class="flex items-center gap-1.5"><span class="w-2.5 h-2.5 rounded-full" style="background:#818CF8"></span>
        温和紫</span>
      <span class="text-gray-300">|</span>
      <span class="text-gray-400"><i class="ri-emotion-line mr-1"></i>微笑弧线</span>
    </div>
  </div>

  <script>
    const phone = document.querySelector('#phoneFrame');
    const statusBar = document.querySelector('#statusBar');
    const content = document.querySelector('#phoneContent');
    const toggle = document.querySelector('#togglePreview');
    const label = document.querySelector('#toggleLabel');
    const icon = toggle.querySelector('i');
    const colorBar = document.querySelector('#colorBar');
    let preview = false;

    toggle.addEventListener('click', () => {
      preview = !preview;

      if (preview) {
        phone.classList.add('bg-white/5');
        phone.classList.remove('bg-white/30');
        statusBar.classList.add('opacity-0');
        content.classList.add('opacity-0');
        colorBar.classList.add('opacity-0', 'pointer-events-none');
        icon.className = 'ri-eye-off-line text-base';
        label.textContent = '显示界面';
      } else {
        phone.classList.remove('bg-white/5');
        phone.classList.add('bg-white/30');
        statusBar.classList.remove('opacity-0');
        content.classList.remove('opacity-0');
        colorBar.classList.remove('opacity-0', 'pointer-events-none');
        icon.className = 'ri-eye-line text-base';
        label.textContent = '仅看背景';
      }
    });
  </script>

</body>

</html>
