  <style>
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(circle at top left, #dbeafe 0%, #f8fafc 45%, #eef4ff 100%);
    }

    .glass {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid rgba(255, 255, 255, 0.3);
    }

    .glass-header {
      background: rgba(255, 255, 255, 0.80);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .card-shadow {
      box-shadow: 0 4px 20px rgba(96, 144, 255, 0.10), inset 0 1px 0 rgba(255, 255, 255, 0.6);
    }

    .gradient-blue {
      background: linear-gradient(135deg, #4f8cff 0%, #77a6ff 100%);
    }

    .bottom-blur {
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    /* 医生卡片动画 */
    .doctor-card {
      transition: all 0.3s ease;
    }

    .doctor-card:active {
      transform: scale(0.98);
    }

    /* 头像渐变色环 */
    .avatar-ring {
      box-shadow: 0 0 0 2px rgba(79, 140, 255, 0.25);
    }

    /* 标签选中指示器 */
    .tab-indicator {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* 骨架屏脉冲 */
    @keyframes shimmer {
      0% {
        background-position: -200% 0;
      }

      100% {
        background-position: 200% 0;
      }
    }

    .shimmer {
      background: linear-gradient(90deg, #f0f0f0 25%, #e8ecf4 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }

    /* 呼叫按钮波纹 */
    @keyframes call-ripple {
      0% {
        box-shadow: 0 0 0 0 rgba(52, 199, 89, 0.4);
      }

      100% {
        box-shadow: 0 0 0 12px rgba(52, 199, 89, 0);
      }
    }

    .call-btn {
      animation: call-ripple 2s ease-in-out infinite;
    }

    /* 自定义分割线 */
    .divider-gradient {
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, rgba(79, 140, 255, 0.12) 50%, transparent 100%);
    }
  </style>
</head>
