<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>爱牙看看-登录UI</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI";
      background: #eef2f7;
      overflow: hidden;
    }

    .glass {
      backdrop-filter: blur(20px);
      background: rgba(255, 255, 255, .7);
    }

    .phoneShadow {
      box-shadow:
        0 30px 80px rgba(0, 0, 0, .08);
    }

    .gradientBg {
      background:
        linear-gradient(180deg,
          #eff8ff 0%,
          #dbeafe 35%,
          #ffffff 70%);
    }

    .hideScroll::-webkit-scrollbar {
      display: none;
    }

    .float {
      animation: float 3s ease-in-out infinite;
    }


    .btn {
      transition: .35s;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .card {
      box-shadow:
        0 8px 30px rgba(59, 130, 246, .08);
    }
  </style>

</head>

<body class="flex gap-12 justify-center items-center min-h-screen px-10">

  <!-- 登录首页 -->
  <div
    class="relative w-[375px] h-[812px] rounded-[40px] overflow-hidden border-[8px] border-black bg-white phoneShadow">

    <!-- 状态栏 -->

    <div class="absolute top-0 left-0 h-11 px-6 w-full flex justify-between items-end pb-1 z-50">

      <div class="text-black font-semibold text-sm">
        9:41
      </div>

      <div class="flex gap-1">

        <i class="ri-signal-wifi-fill text-sm"></i>
        <i class="ri-battery-charge-fill text-sm"></i>

      </div>

    </div>


    <div class="gradientBg h-full flex flex-col pt-16">

      <!-- 顶部人物区 -->

      <div class="px-8">
        <div class="px-8 mt-3 text-center">

          <div class="text-[28px] font-bold text-black">
            爱牙看看
          </div>

          <div class="mt-2 text-[14px] text-black opacity-70">
            让AI陪伴你的牙齿健康成长
          </div>

        </div>

        <div class="flex justify-center mt-8">

          <img class="w-full object-contain" src="./login-bg.png">

        </div>
        <div class="glass card rounded-[16px] h-[70px] px-6 flex items-center">
          <i class="ri-smartphone-line text-[24px] text-black">
          </i>
          <div class="ml-4 text-[22px] font-semibold tracking-wide text-black">
            138 **** 9527
          </div>
        </div>
      </div>

      <!-- 手机卡 -->
      <div class="mt-14 px-8">
        <!-- 登录按钮 -->
        <div
          class="btn mt-7 h-[58px] rounded-full bg-gradient-to-r from-blue-500 to-blue-600 flex items-center justify-center ">
          <div class="text-white text-[18px] font-semibold">
            一键登录
          </div>
        </div>
        <div
          class="btn mt-5 h-[58px] rounded-full bg-gradient-to-r from-white-500 to-white-600 flex items-center border border-gray-300 justify-center ">
          <div class="text-blue-500 text-[18px] font-semibold">
            其他方式登录
          </div>
        </div>
        <!-- 协议 -->
        <div class="mt-5 flex items-start">

          <i class="ri-checkbox-circle-fill text-blue-500 text-lg mt-[2px]">
          </i>

          <div class="ml-2 text-[12px] leading-5 text-black opacity-70">

            登录即表示同意
            《用户协议》
            与
            《隐私政策》

          </div>

        </div>


        <!-- 其它方式 -->

        <!-- <div class="mt-10 flex justify-center items-center gap-10">

          <div class="flex flex-col items-center">

            <i class="ri-wechat-line text-[28px] text-black">
            </i>

            <div class="mt-1 text-xs text-black">

              微信

            </div>

          </div>


          <div class="flex flex-col items-center">

            <i class="ri-phone-line text-[28px] text-black">
            </i>

            <div class="mt-1 text-xs text-black">

              短信登录

            </div>

          </div>

        </div> -->

      </div>

    </div>

  </div>

</body>

</html>
