<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5">
    <title>牙科服务 · 圆形图标卡 (卡片缩小30%)</title>
    <!-- Font Awesome 6 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #eef3f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .service-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 24px;
            max-width: 1400px;
            width: 100%;
        }

        .service-card {
            background: #ffffff;
            border-radius: 50%;
            aspect-ratio: 1 / 1;
            width: 70%;
            margin: 0 auto;
            padding: 8px;
            box-shadow: 0 8px 18px -6px rgba(18, 75, 105, 0.15), 0 0 0 1px rgba(175, 205, 225, 0.5);
            transition: transform 0.2s ease, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.7);
        }

        .service-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 16px 26px -8px rgba(16, 95, 130, 0.25), 0 0 0 1px rgba(75, 155, 200, 0.6);
        }

        .card-icon {
            font-size: 3.8rem;
            margin-bottom: 8px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }

        .card-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #1a556f;
            letter-spacing: -0.2px;
            line-height: 1.2;
            max-width: 100%;
            word-break: keep-all;
        }

        /* 图标颜色 - 20种柔和色彩 */
        .card-1 .card-icon { color: hsl(90, 55%, 45%); }   /* 窝沟封闭 */
        .card-2 .card-icon { color: hsl(150, 50%, 50%); }  /* 牙齿矫正 */
        .card-3 .card-icon { color: hsl(30, 70%, 55%); }   /* 全瓷牙 */
        .card-4 .card-icon { color: hsl(320, 50%, 55%); }  /* 烤瓷牙 */
        .card-5 .card-icon { color: hsl(180, 50%, 45%); }  /* 根管治疗 */
        .card-6 .card-icon { color: hsl(50, 80%, 55%); }   /* 儿牙 */
        .card-7 .card-icon { color: hsl(210, 55%, 55%); }  /* 牙齿美白 */
        .card-8 .card-icon { color: hsl(160, 40%, 50%); }  /* 预防保健 */
        .card-9 .card-icon { color: hsl(340, 55%, 60%); }  /* 无痛技术 */
        .card-10 .card-icon { color: hsl(270, 45%, 55%); } /* 全口种植 */
        .card-11 .card-icon { color: hsl(80, 50%, 45%); }  /* 洁牙 */
        .card-12 .card-icon { color: hsl(0, 55%, 55%); }    /* 拔牙 */
        .card-13 .card-icon { color: hsl(140, 45%, 50%); }  /* 牙周治疗 */
        .card-14 .card-icon { color: hsl(25, 65%, 50%); }   /* 种植修复 */
        .card-15 .card-icon { color: hsl(190, 55%, 50%); }  /* 贴面 */
        .card-16 .card-icon { color: hsl(75, 55%, 45%); }   /* 嵌体 */
        .card-17 .card-icon { color: hsl(350, 60%, 55%); }  /* 活动义齿 */
        .card-18 .card-icon { color: hsl(110, 45%, 50%); }  /* 口腔正畸 */
        .card-19 .card-icon { color: hsl(230, 50%, 55%); }  /* 儿童齿科 */
        .card-20 .card-icon { color: hsl(40, 65%, 55%); }   /* 口腔黏膜科 */

        /* 彩色阴影微调 */
        .card-1 .card-icon { filter: drop-shadow(0 4px 8px hsla(90, 55%, 45%, 0.3)); }
        .card-2 .card-icon { filter: drop-shadow(0 4px 8px hsla(150, 50%, 50%, 0.3)); }
        .card-3 .card-icon { filter: drop-shadow(0 4px 8px hsla(30, 70%, 55%, 0.3)); }
        .card-4 .card-icon { filter: drop-shadow(0 4px 8px hsla(320, 50%, 55%, 0.3)); }
        .card-5 .card-icon { filter: drop-shadow(0 4px 8px hsla(180, 50%, 45%, 0.3)); }
        .card-6 .card-icon { filter: drop-shadow(0 4px 8px hsla(50, 80%, 55%, 0.3)); }
        .card-7 .card-icon { filter: drop-shadow(0 4px 8px hsla(210, 55%, 55%, 0.3)); }
        .card-8 .card-icon { filter: drop-shadow(0 4px 8px hsla(160, 40%, 50%, 0.3)); }
        .card-9 .card-icon { filter: drop-shadow(0 4px 8px hsla(340, 55%, 60%, 0.3)); }
        .card-10 .card-icon { filter: drop-shadow(0 4px 8px hsla(270, 45%, 55%, 0.3)); }
        .card-11 .card-icon { filter: drop-shadow(0 4px 8px hsla(80, 50%, 45%, 0.3)); }
        .card-12 .card-icon { filter: drop-shadow(0 4px 8px hsla(0, 55%, 55%, 0.3)); }
        .card-13 .card-icon { filter: drop-shadow(0 4px 8px hsla(140, 45%, 50%, 0.3)); }
        .card-14 .card-icon { filter: drop-shadow(0 4px 8px hsla(25, 65%, 50%, 0.3)); }
        .card-15 .card-icon { filter: drop-shadow(0 4px 8px hsla(190, 55%, 50%, 0.3)); }
        .card-16 .card-icon { filter: drop-shadow(0 4px 8px hsla(75, 55%, 45%, 0.3)); }
        .card-17 .card-icon { filter: drop-shadow(0 4px 8px hsla(350, 60%, 55%, 0.3)); }
        .card-18 .card-icon { filter: drop-shadow(0 4px 8px hsla(110, 45%, 50%, 0.3)); }
        .card-19 .card-icon { filter: drop-shadow(0 4px 8px hsla(230, 50%, 55%, 0.3)); }
        .card-20 .card-icon { filter: drop-shadow(0 4px 8px hsla(40, 65%, 55%, 0.3)); }

        @media (max-width: 1200px) {
            .service-grid { grid-template-columns: repeat(4, 1fr); }
        }
        @media (max-width: 900px) {
            .service-grid { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 600px) {
            .service-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 400px) {
            .service-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="service-grid">
        <!-- 1. 窝沟封闭 (更换为锁头) -->
        <div class="service-card card-1">
            <div class="card-icon"><i class="fa-solid fa-lock"></i></div>
            <div class="card-title">窝沟封闭</div>
        </div>
        <!-- 2. 牙齿矫正 -->
        <div class="service-card card-2">
            <div class="card-icon"><i class="fa-solid fa-teeth"></i></div>
            <div class="card-title">牙齿矫正</div>
        </div>
        <!-- 3. 全瓷牙 -->
        <div class="service-card card-3">
            <div class="card-icon"><i class="fa-solid fa-tooth"></i></div>
            <div class="card-title">全瓷牙</div>
        </div>
        <!-- 4. 烤瓷牙 -->
        <div class="service-card card-4">
            <div class="card-icon"><i class="fa-solid fa-tooth"></i></div>
            <div class="card-title">烤瓷牙</div>
        </div>
        <!-- 5. 根管治疗 -->
        <div class="service-card card-5">
            <div class="card-icon"><i class="fa-solid fa-tooth"></i></div>
            <div class="card-title">根管治疗</div>
        </div>
        <!-- 6. 儿牙 -->
        <div class="service-card card-6">
            <div class="card-icon"><i class="fa-solid fa-child"></i></div>
            <div class="card-title">儿牙</div>
        </div>
        <!-- 7. 牙齿美白 (更换为太阳) -->
        <div class="service-card card-7">
            <div class="card-icon"><i class="fa-solid fa-sun"></i></div>
            <div class="card-title">牙齿美白</div>
        </div>
        <!-- 8. 预防保健 -->
        <div class="service-card card-8">
            <div class="card-icon"><i class="fa-solid fa-heart-pulse"></i></div>
            <div class="card-title">预防保健</div>
        </div>
        <!-- 9. 无痛技术 -->
        <div class="service-card card-9">
            <div class="card-icon"><i class="fa-regular fa-face-smile"></i></div>
            <div class="card-title">无痛技术</div>
        </div>
        <!-- 10. 全口种植 -->
        <div class="service-card card-10">
            <div class="card-icon"><i class="fa-solid fa-tooth"></i></div>
            <div class="card-title">全口种植</div>
        </div>
        <!-- 11. 洁牙 -->
        <div class="service-card card-11">
            <div class="card-icon"><i class="fa-solid fa-brush"></i></div>
            <div class="card-title">洁牙</div>
        </div>
        <!-- 12. 拔牙 -->
        <div class="service-card card-12">
            <div class="card-icon"><i class="fa-solid fa-xmark-circle"></i></div>
            <div class="card-title">拔牙</div>
        </div>
        <!-- 13. 牙周治疗 -->
        <div class="service-card card-13">
            <div class="card-icon"><i class="fa-solid fa-teeth-open"></i></div>
            <div class="card-title">牙周治疗</div>
        </div>
        <!-- 14. 种植修复 -->
        <div class="service-card card-14">
            <div class="card-icon"><i class="fa-solid fa-seedling"></i></div>
            <div class="card-title">种植修复</div>
        </div>
        <!-- 15. 贴面 -->
        <div class="service-card card-15">
            <div class="card-icon"><i class="fa-solid fa-layer-group"></i></div>
            <div class="card-title">贴面</div>
        </div>
        <!-- 16. 嵌体 -->
        <div class="service-card card-16">
            <div class="card-icon"><i class="fa-solid fa-puzzle-piece"></i></div>
            <div class="card-title">嵌体</div>
        </div>
        <!-- 17. 活动义齿 -->
        <div class="service-card card-17">
            <div class="card-icon"><i class="fa-solid fa-rotate"></i></div>
            <div class="card-title">活动义齿</div>
        </div>
        <!-- 18. 口腔正畸 -->
        <div class="service-card card-18">
            <div class="card-icon"><i class="fa-solid fa-arrow-right-arrow-left"></i></div>
            <div class="card-title">口腔正畸</div>
        </div>
        <!-- 19. 儿童齿科 -->
        <div class="service-card card-19">
            <div class="card-icon"><i class="fa-solid fa-baby"></i></div>
            <div class="card-title">儿童齿科</div>
        </div>
        <!-- 20. 口腔黏膜科 -->
        <div class="service-card card-20">
            <div class="card-icon"><i class="fa-regular fa-face-grin"></i></div>
            <div class="card-title">口腔黏膜科</div>
        </div>
    </div>
</body>
</html>
