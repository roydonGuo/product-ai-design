<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0">
    <title>牙科医患 · 清新科技桌面</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            height: 100vh;
            background: linear-gradient(145deg, #b0eaff 0%, #5bb4ff 100%);
            display: flex;
            flex-direction: column;
            position: relative;
            padding: 0;
            overflow: hidden;
        }

        .tech-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .tech-bg::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(0deg, rgba(255,255,255,0.1) 0px, rgba(255,255,255,0.1) 1px, transparent 1px, transparent 40px),
                repeating-linear-gradient(90deg, rgba(255,255,255,0.1) 0px, rgba(255,255,255,0.1) 1px, transparent 1px, transparent 40px);
            pointer-events: none;
        }

        .tech-bg::after {
            content: "";
            position: absolute;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            background: radial-gradient(circle at 30% 40%, rgba(255,255,240,0.2) 0%, transparent 30%),
                        radial-gradient(circle at 80% 70%, rgba(200,230,255,0.3) 0%, transparent 40%);
            pointer-events: none;
        }

        .bg-decor {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .bg-decor i {
            position: absolute;
            color: rgba(255, 255, 255, 0.2);
            font-size: clamp(200px, 30vw, 420px);
            transform: rotate(5deg);
        }

        .decor-tooth-1 {
            bottom: -30px;
            right: 0;
            transform: rotate(15deg);
            color: rgba(255,255,240,0.25);
        }

        .decor-tooth-2 {
            top: 0;
            left: -30px;
            transform: rotate(-10deg) scaleX(-1);
            font-size: 340px;
            color: rgba(255,250,210,0.2);
        }

        .decor-smile-1 {
            top: 20%;
            right: 15%;
            font-size: 280px;
            color: rgba(255,255,220,0.15);
            transform: rotate(-5deg);
        }

        .decor-smile-2 {
            bottom: 15%;
            left: 5%;
            font-size: 220px;
            color: rgba(230,245,255,0.2);
            transform: rotate(10deg);
        }

        .status-bar {
            position: relative;
            z-index: 20;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            color: #105a7a;
            font-weight: 550;
            font-size: 1.4rem;
            background: transparent;
            border: none;
            box-shadow: none;
            text-shadow: 0 2px 6px rgba(255,255,255,0.6);
        }

        .clinic-info {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .clinic-info i {
            font-size: 2rem;
            color: #166b8f;
            filter: drop-shadow(0 2px 4px rgba(255,255,255,0.6));
        }
        .clinic-info span {
            font-size: 1.5rem;
            color: #09445c;
        }

        .right-status {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .right-status i {
            font-size: 1.6rem;
            color: #19799e;
            filter: drop-shadow(0 2px 4px rgba(255,255,255,0.6));
        }
        .time {
            font-weight: 600;
            background: rgba(255,255,255,0.25);
            padding: 8px 22px;
            border-radius: 40px;
            margin-left: 10px;
            color: #0f4d68;
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .app-grid {
            position: relative;
            z-index: 20;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 0 24px;
            flex: 1;
            align-content: center;
        }

        .app-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 28px 16px 22px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-shadow: 0 20px 30px -10px rgba(0, 80, 120, 0.3), 0 8px 15px -5px rgba(0,0,0,0.1);
            border: 1px solid rgba(255, 255, 255, 0.8);
            transition: transform 0.2s ease, box-shadow 0.2s;
            cursor: pointer;
        }

        .app-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 28px 40px -12px rgba(0, 110, 170, 0.4);
            background: rgba(255, 255, 255, 0.9);
        }

        .app-icon {
            font-size: 4.2rem;
            margin-bottom: 16px;
            filter: drop-shadow(0 4px 6px rgba(60, 130, 180, 0.3));
        }

        .app-label {
            font-size: 1.8rem;
            font-weight: 550;
            letter-spacing: 0.5px;
            color: #125972;
            border-top: 2px solid rgba(65, 145, 185, 0.35);
            padding-top: 14px;
            width: 100%;
        }

        .card-1 .app-icon { color: #1a7faa; }
        .card-2 .app-icon { color: #2f9e68; }
        .card-3 .app-icon { color: #c45a8a; }
        .card-4 .app-icon { color: #e38b4c; }
        .card-5 .app-icon { color: #5b8cb0; }
        .card-6 .app-icon { color: #9b7bb5; }

        .tooth-mark {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            display: flex;
            gap: 40px;
            color: rgba(30, 100, 130, 0.3);
            font-size: 2.5rem;
            pointer-events: none;
        }

        @media (min-width: 1800px) {
            .app-label { font-size: 2rem; }
            .app-icon { font-size: 4.8rem; }
            .status-bar { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
    <div class="tech-bg"></div>

    <div class="bg-decor">
        <i class="fa-solid fa-tooth decor-tooth-1"></i>
        <i class="fa-regular fa-face-smile decor-smile-1"></i>
        <i class="fa-solid fa-tooth decor-tooth-2"></i>
        <i class="fa-regular fa-face-smile decor-smile-2"></i>
    </div>

    <div class="status-bar">
        <div class="clinic-info">
            <i class="fa-regular fa-face-smile"></i>
            <span>微笑牙科 · 沟通版</span>
            <i class="fa-solid fa-tooth" style="font-size:1.8rem;"></i>
        </div>
        <div class="right-status">
            <i class="fa-solid fa-wifi"></i>
            <span class="time">14:30</span>
        </div>
    </div>

    <div class="app-grid">
        <div class="app-card card-1">
            <i class="fa-solid fa-robot app-icon"></i>
            <div class="app-label">AI检查</div>
        </div>
        <div class="app-card card-2">
            <i class="fa-solid fa-share-nodes app-icon"></i>
            <div class="app-label">无线投屏</div>
        </div>
        <div class="app-card card-3">
            <i class="fa-solid fa-hand-holding-heart app-icon"></i>
            <div class="app-label">接诊治谈</div>
        </div>
        <div class="app-card card-4">
            <i class="fa-solid fa-photo-film app-icon"></i>
            <div class="app-label">影音模式</div>
        </div>
        <div class="app-card card-5">
            <!-- 更换为更清晰的网格图标 fa-table-cells，与其余卡片一致 -->
            <i class="fa-solid fa-table-cells app-icon"></i>
            <div class="app-label">门诊应用</div>
        </div>
        <div class="app-card card-6">
            <i class="fa-solid fa-book-open app-icon"></i>
            <div class="app-label">科普宣教</div>
        </div>
    </div>

    <div class="tooth-mark">
        <i class="fa-regular fa-face-smile"></i>
        <i class="fa-solid fa-tooth"></i>
        <i class="fa-regular fa-heart"></i>
    </div>
</body>
</html>
