<!doctype html>
<html lang="zh-CN" class="h-full dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>dear agent - UI 设计方案</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            brand: {
              500: "#2563EB",
              600: "#1D4ED8",
            },
          },
          boxShadow: {
            glass: "0 8px 32px rgba(37, 99, 235, 0.18)",
          },
        },
      },
    };
  </script>
  <style>
    body {
      background:
        radial-gradient(circle at 15% 15%, rgba(37, 99, 235, 0.16), transparent 30%),
        radial-gradient(circle at 85% 75%, rgba(37, 99, 235, 0.2), transparent 35%),
        linear-gradient(160deg, #eef4ff 0%, #dce8ff 45%, #f7faff 100%);
    }

    .dark body {
      background:
        radial-gradient(circle at 20% 20%, rgba(37, 99, 235, 0.35), transparent 35%),
        radial-gradient(circle at 85% 75%, rgba(37, 99, 235, 0.3), transparent 40%),
        linear-gradient(150deg, #0a1020 0%, #0c1630 50%, #0a1020 100%);
    }

    .glass-panel {
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.45), rgba(255, 255, 255, 0.22));
    }

    .dark .glass-panel {
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0.06));
    }
  </style>
</head>

<body class="h-full w-full text-black dark:text-white selection:bg-brand-500 selection:text-white">
  <div class="group fixed inset-x-0 top-0 z-50 flex justify-center pt-2">
    <button aria-label="展开导航"
      class="flex h-8 w-8 items-center justify-center rounded-full bg-white/35 backdrop-blur-xl shadow-glass border border-white/40 transition duration-200 hover:bg-white/50 dark:bg-white/10 dark:border-white/20 dark:hover:bg-white/20"
      type="button">
      <i data-lucide="sparkles" class="h-4 w-4 text-black dark:text-white"></i>
    </button>
    <nav
      class="pointer-events-none absolute top-3 scale-95 opacity-0 transition-all duration-300 group-hover:pointer-events-auto group-hover:top-5 group-hover:scale-100 group-hover:opacity-100">
      <div
        class="glass-panel w-[560px] rounded-full border border-white/40 px-6 py-3 backdrop-blur-xl shadow-glass dark:border-white/20">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-3">
            <div class="flex h-8 w-8 items-center justify-center rounded-xl bg-brand-500/85">
              <i data-lucide="bot" class="h-4 w-4 text-white"></i>
            </div>
            <span class="text-sm font-semibold text-black dark:text-white">dear agent</span>
          </div>
          <div class="flex items-center gap-3">
            <button id="themeBtn"
              class="flex h-8 w-8 items-center justify-center rounded-xl bg-white/40 border border-white/40 hover:bg-white/60 transition cursor-pointer dark:bg-white/10 dark:border-white/20 dark:hover:bg-white/20"
              aria-label="切换主题" type="button">
              <i data-lucide="moon-star" class="h-4 w-4 text-black dark:text-white"></i>
            </button>
            <button class="h-8 w-8 rounded-full bg-brand-600 text-white text-xs font-bold cursor-pointer" type="button"
              aria-label="用户头像">U</button>
          </div>
        </div>
      </div>
    </nav>
  </div>

  <div class="h-full w-full p-6">
    <main
      class="glass-panel h-full w-full overflow-hidden flex rounded-3xl border border-white/40 backdrop-blur-2xl shadow-glass dark:border-white/20">
      <aside class="p-4 flex flex-col">
        <div class="mb-6 mt-2 flex items-center justify-center">
          <div class="flex h-10 w-10 items-center justify-center rounded-2xl bg-brand-500/90">
            <i data-lucide="heart-handshake" class="h-5 w-5 text-white"></i>
          </div>
        </div>
        <div class="space-y-4 flex-1">
          <div>
            <div data-route="home"
              class="route-link flex flex-col items-center gap-1 rounded-2xl bg-white/45 p-4 text-left text-sm font-semibold text-black transition hover:bg-white/70 cursor-pointer dark:bg-white/10 dark:text-white dark:hover:bg-white/20">
              <i data-lucide="message-circle" class="h-6 w-6"></i>
              <div>对话</div>
            </div>
          </div>
          <div>
            <div data-route="llm"
              class="route-link flex flex-col items-center gap-1 rounded-2xl bg-white/45 p-4 text-left text-sm font-semibold text-black transition hover:bg-white/70 cursor-pointer dark:bg-white/10 dark:text-white dark:hover:bg-white/20">
              <i data-lucide="brain" class="h-6 w-6"></i>
              <div>模型</div>
            </div>
          </div>
          <div>
            <div data-route="skills"
              class="route-link flex flex-col items-center gap-1 rounded-2xl bg-brand-500 p-4 text-left text-sm font-semibold text-black transition hover:bg-white/70 cursor-pointer dark:bg-white/10 dark:text-white dark:hover:bg-white/20">
              <i data-lucide="wrench" class="h-6 w-6"></i>
              <div>Skills</div>
            </div>
          </div>
          <div>
            <div data-route="knowledge"
              class="route-link flex flex-col items-center gap-1 rounded-2xl bg-white/45 p-4 text-left text-sm font-semibold text-black transition hover:bg-white/70 cursor-pointer dark:bg-white/10 dark:text-white dark:hover:bg-white/20">
              <i data-lucide="book" class="h-6 w-6"></i>
              <div>知识</div>
            </div>
          </div>
          <div>
            <div data-route="memory"
              class="route-link flex flex-col items-center gap-1 rounded-2xl bg-white/45 p-4 text-left text-sm font-semibold text-black transition hover:bg-white/70 cursor-pointer dark:bg-white/10 dark:text-white dark:hover:bg-white/20">
              <i data-lucide="database" class="h-6 w-6"></i>
              <div>记忆</div>
            </div>
          </div>
          <div>
            <div data-route="creation"
              class="route-link flex flex-col items-center gap-1 rounded-2xl bg-white/45 p-4 text-left text-sm font-semibold text-black transition hover:bg-white/70 cursor-pointer dark:bg-white/10 dark:text-white dark:hover:bg-white/20">
              <i data-lucide="palette" class="h-6 w-6"></i>
              <div>创作</div>
            </div>
          </div>
        </div>
        <div class="flex flex-col items-center justify-center space-y-4">
          <i data-lucide="circle-question-mark" class="h-6 w-6"></i>
          <i data-lucide="settings" class="h-6 w-6"></i>
        </div>
      </aside>

      <section data-page="home"
        class="route-page flex-1 hidden border border-white/40 p-6 backdrop-blur-2xl shadow-glass dark:border-white/20">
        <div class="grid h-full grid-cols-[7fr_3fr] gap-5">
          <div class="flex h-full flex-col gap-5">

            <div class="glass-panel flex-1 rounded-2xl border border-white/40 p-5 dark:border-white/20 flex flex-col">
              <div class="space-y-3 flex-1">
                <div
                  class="max-w-[78%] rounded-2xl bg-white/70 p-3 text-sm text-black dark:bg-white/10 dark:text-white">
                  <span class="mb-1.5 flex items-center gap-2 text-xs font-semibold"><i data-lucide="user-round"
                      class="h-3.5 w-3.5"></i>你</span>我最近有点焦虑，事情太多了。
                </div>
                <div class="ml-auto max-w-[78%] rounded-2xl bg-brand-500 p-3 text-sm text-white"><span
                    class="mb-1.5 flex items-center gap-2 text-xs font-semibold"><i data-lucide="bot"
                      class="h-3.5 w-3.5"></i>dear agent</span>我理解你的状态。我们先把任务分成三块，我陪你一步步完成。</div>
              </div>
              <div class="mt-5 flex gap-3">
                <input
                  class="flex-1 rounded-2xl border border-white/50 bg-white/80 px-4 py-3 text-sm text-black placeholder:text-black/60 outline-none focus:border-brand-500 dark:border-white/25 dark:bg-white/10 dark:text-white dark:placeholder:text-white/60"
                  placeholder="输入你想对智能体说的话..." />
                <button
                  class="flex items-center gap-2 rounded-2xl bg-brand-500 px-5 py-3 text-sm font-semibold text-white transition hover:bg-brand-600 cursor-pointer"><i
                    data-lucide="send-horizontal" class="h-4 w-4"></i>发送</button>
              </div>
            </div>
          </div>
          <aside class="space-y-5 flex flex-col">
            <div class="glass-panel rounded-2xl border border-white/40 p-5 dark:border-white/20 flex-1 flex flex-col">
              <h2 class="flex items-center gap-2 text-base font-semibold text-black dark:text-white"><i
                  data-lucide="monitor-play" class="h-4 w-4 text-brand-500"></i>Live2D 实体视图</h2>
              <div class="mt-3 rounded-2xl bg-gradient-to-br from-brand-500/35 to-brand-600/25 p-3 flex-1">
                <div
                  class="flex h-full items-end justify-center rounded-2xl border border-white/35 bg-white/20 text-sm font-medium text-white">
                  Live2D Model Canvas</div>
              </div>
            </div>
            <div class="glass-panel rounded-2xl border border-white/40 p-5 dark:border-white/20">
              <h2 class="flex items-center gap-2 text-base font-semibold text-black dark:text-white"><i
                  data-lucide="activity" class="h-4 w-4 text-brand-500"></i>情绪追踪</h2>
              <ul class="mt-3 space-y-2 text-sm">
                <li class="rounded-xl bg-white/60 px-3 py-2 dark:bg-white/10">今日情绪稳定度：86%</li>
                <li class="rounded-xl bg-white/60 px-3 py-2 dark:bg-white/10">共情命中率：91%</li>
                <li class="rounded-xl bg-white/60 px-3 py-2 dark:bg-white/10">主动关怀触发：12 次</li>
              </ul>
            </div>
          </aside>
        </div>
      </section>

      <section data-page="skills"
        class="route-page flex-1 hidden border border-white/40 p-6 backdrop-blur-2xl shadow-glass dark:border-white/20">

      </section>

      <section data-page="knowledge"
        class="route-page  flex-1 hidden  border border-white/40 p-6 backdrop-blur-2xl shadow-glass dark:border-white/20">

      </section>

      <section data-page="creation"
        class="route-page  flex-1 hidden  border border-white/40 p-6 backdrop-blur-2xl shadow-glass dark:border-white/20">

      </section>
    </main>
  </div>

  <script>
    const root = document.documentElement;
    const btn = document.getElementById("themeBtn");
    const routeLinks = Array.from(document.querySelectorAll(".route-link"));
    const routePages = Array.from(document.querySelectorAll(".route-page"));
    const baseNavClass = "flex flex-col w-full items-center rounded-2xl py-3 px-4 gap-1 ext-left text-sm font-semibold transition cursor-pointer";
    const inactiveNavClass = "bg-white/45 text-black hover:bg-white/70 dark:bg-white/10 dark:text-white dark:hover:bg-white/20";
    const activeNavClass = "bg-brand-500 text-white hover:bg-brand-600";

    const activateRoute = (routeName) => {
      routePages.forEach((page) => {
        const show = page.dataset.page === routeName;
        page.classList.toggle("hidden", !show);
      });

      routeLinks.forEach((link) => {
        const active = link.dataset.route === routeName;
        link.className = `${baseNavClass} ${active ? activeNavClass : inactiveNavClass}`;
      });

      lucide.createIcons();
    };
    const renderThemeIcon = () => {
      const dark = root.classList.contains("dark");
      btn.innerHTML = dark
        ? '<i data-lucide="sun-medium" class="h-4 w-4 text-white"></i>'
        : '<i data-lucide="moon-star" class="h-4 w-4 text-black"></i>';
      lucide.createIcons();
    };
    btn.addEventListener("click", () => {
      root.classList.toggle("dark");
      renderThemeIcon();
    });
    routeLinks.forEach((link) => {
      link.addEventListener("click", () => activateRoute(link.dataset.route));
    });
    lucide.createIcons();
    renderThemeIcon();
    activateRoute("home");
  </script>
</body>

</html>
