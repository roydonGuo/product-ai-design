<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>设计系统笔记 — KnowFlow</title>
<style>
/* ===== RESET & TOKENS ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  background:oklch(96.8% 0.006 75);
  color:oklch(17% 0.012 55);
  overflow:hidden;height:100vh;
}
:root{
  --bg:oklch(96.8% 0.006 75);
  --surface:oklch(99.3% 0.003 78);
  --fg:oklch(17% 0.012 55);
  --muted:oklch(48% 0.008 55);
  --border:oklch(89% 0.005 70);
  --accent:oklch(54% 0.14 30);
  --accent-soft:oklch(75% 0.06 30);
  --accent-hover:oklch(48% 0.14 30);
  --accent2:oklch(52% 0.10 245);
  --accent2-soft:oklch(75% 0.06 245);
  --green:oklch(55% 0.12 150);
  --green-soft:oklch(75% 0.06 150);
  --tag-bg:oklch(93% 0.006 70);
  --hover:oklch(94% 0.005 65);
  --shadow:0 1px 3px oklch(0% 0 0 / 0.04),0 4px 12px oklch(0% 0 0 / 0.06);
  --shadow-lg:0 8px 30px oklch(0% 0 0 / 0.1);
  --radius:12px;
  --radius-sm:8px;
  --header-h:52px;
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--muted)}

/* ===== TOP NAV ===== */
.detail-header{
  height:var(--header-h);
  display:flex;align-items:center;gap:12px;
  padding:0 16px;
  background:color-mix(in oklch, var(--surface) 88%, transparent);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  -webkit-app-region:drag;
}
.back-btn{
  display:flex;align-items:center;gap:4px;
  padding:6px 12px;height:34px;
  background:none;border:none;
  font-size:14px;color:var(--muted);cursor:pointer;
  border-radius:var(--radius-sm);
  -webkit-app-region:no-drag;
  transition:all 0.12s;
}
.back-btn:hover{background:var(--hover);color:var(--fg)}
.kb-title{font-size:15px;font-weight:640;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.header-actions{display:flex;gap:6px;-webkit-app-region:no-drag}
.hdr-btn{
  display:inline-flex;align-items:center;gap:5px;
  height:32px;padding:0 12px;
  font-size:13px;font-weight:500;
  border-radius:var(--radius-sm);
  border:1px solid var(--border);
  background:var(--surface);color:var(--fg);
  cursor:pointer;white-space:nowrap;
  transition:all 0.12s;
}
.hdr-btn:hover{background:var(--hover)}
.hdr-btn-primary{background:var(--accent);border-color:var(--accent);color:white}
.hdr-btn-primary:hover{background:var(--accent-hover)}
.hdr-btn-icon{width:32px;padding:0;justify-content:center;font-size:16px}

/* ===== BODY LAYOUT ===== */
.detail-body{display:flex;height:calc(100vh - var(--header-h))}

/* ===== TREE PANEL ===== */
.tree-panel{
  width:300px;min-width:200px;
  display:flex;flex-direction:column;
  background:var(--surface);
  border-right:1px solid var(--border);
  flex-shrink:0;
}
.tree-search{
  padding:10px 12px;
  border-bottom:1px solid var(--border);
  position:relative;
}
.tree-search input{
  width:100%;height:34px;
  padding:0 10px 0 30px;
  font-size:13px;
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  background:var(--bg);
  color:var(--fg);
  outline:none;
  transition:border-color 0.15s;
}
.tree-search input::placeholder{color:var(--muted)}
.tree-search input:focus{border-color:var(--accent)}
/* search icon uses inline lucide style */
.tree-content{flex:1;overflow-y:auto;padding:6px 0}
.tree-empty{
  padding:32px 16px;text-align:center;font-size:13px;color:var(--muted);line-height:1.6;
}

/* ===== TREE NODES ===== */
.tree-node{cursor:pointer;user-select:none}
.tree-row{
  display:flex;align-items:center;gap:4px;
  padding:4px 12px 4px 0;
  height:34px;
  font-size:13px;
  color:var(--fg);
  transition:background 0.1s;
  position:relative;
}
.tree-row:hover{background:var(--hover)}
.tree-row.selected{background:var(--accent-soft);color:var(--accent);font-weight:500}
.tree-row .indent{flex-shrink:0}
.tree-row .toggle-btn{
  width:20px;height:20px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  border:none;background:none;cursor:pointer;
  font-size:10px;color:var(--muted);
  transition:transform 0.15s;
  border-radius:4px;
}
.tree-row .toggle-btn:hover{background:var(--border);color:var(--fg)}
.tree-row .toggle-btn.expanded{transform:rotate(90deg)}
.tree-row .node-icon{font-size:15px;flex-shrink:0;width:20px;text-align:center}
.tree-row .node-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tree-row .vector-badge{
  width:8px;height:8px;border-radius:50%;flex-shrink:0;
  margin-right:4px;
  background:var(--border);transition:background 0.3s;
}
.tree-row .vector-badge.active{background:var(--green);box-shadow:0 0 0 2px var(--green-soft)}
.tree-row .row-actions{
  display:flex;gap:2px;opacity:0;transition:opacity 0.1s;
  margin-left:auto;flex-shrink:0;
}
.tree-row:hover .row-actions{opacity:1}
.tree-row .row-actions button{
  width:22px;height:22px;
  display:flex;align-items:center;justify-content:center;
  border:none;background:none;cursor:pointer;
  border-radius:4px;font-size:12px;color:var(--muted);
}
.tree-row .row-actions button:hover{background:var(--border);color:var(--fg)}
.tree-children{overflow:hidden}
.tree-children.collapsed{display:none}

/* rename inline edit */
.tree-row .rename-input{
  flex:1;height:24px;padding:0 6px;
  font-size:13px;font-family:inherit;
  border:1px solid var(--accent);border-radius:4px;
  background:var(--surface);color:var(--fg);
  outline:none;
}

/* ===== RESIZE HANDLE ===== */
.resize-handle{
  width:4px;cursor:col-resize;
  flex-shrink:0;
  background:transparent;
  position:relative;z-index:10;
  transition:background 0.15s;
}
.resize-handle:hover,.resize-handle.resizing{background:var(--accent-soft)}

/* ===== CONTENT PANEL ===== */
.content-panel{
  flex:1;display:flex;position:relative;
  overflow:hidden;
}
.markdown-area{
  flex:1;overflow-y:auto;padding:40px 56px 80px;
  min-width:0;
}

/* ===== MARKDOWN VIEW ===== */
.markdown-body{max-width:780px;margin:0 auto;line-height:1.7}
.markdown-body h1{font-size:28px;font-weight:720;margin-bottom:8px;padding-bottom:12px;border-bottom:1px solid var(--border);color:var(--fg)}
.markdown-body h2{font-size:20px;font-weight:680;margin:28px 0 10px;color:var(--fg)}
.markdown-body h3{font-size:17px;font-weight:640;margin:22px 0 8px;color:var(--fg)}
.markdown-body p{font-size:15px;margin-bottom:14px;color:var(--fg);line-height:1.75}
.markdown-body ul,.markdown-body ol{padding-left:24px;margin-bottom:14px}
.markdown-body li{font-size:15px;margin-bottom:4px;line-height:1.6}
.markdown-body code{
  font-family:'JetBrains Mono','SF Mono','Fira Code',ui-monospace,monospace;
  font-size:13px;
  background:var(--tag-bg);
  padding:2px 6px;
  border-radius:4px;
}
.markdown-body pre{
  background:oklch(94% 0.004 70);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  padding:16px;
  margin-bottom:16px;
  overflow-x:auto;
}
.markdown-body pre code{background:none;padding:0;border-radius:0;font-size:13px;line-height:1.6}
.markdown-body blockquote{
  border-left:3px solid var(--accent);
  padding:8px 16px;
  margin:16px 0;
  background:oklch(94% 0.006 70);
  border-radius:0 var(--radius-sm) var(--radius-sm) 0;
}
.markdown-body blockquote p{margin-bottom:0;color:var(--muted);font-style:italic}
.markdown-body table{
  width:100%;border-collapse:collapse;
  margin-bottom:16px;font-size:14px;
}
.markdown-body th,.markdown-body td{
  padding:8px 12px;border:1px solid var(--border);
  text-align:left;
}
.markdown-body th{background:var(--tag-bg);font-weight:600;font-size:13px}
.markdown-body tr:nth-child(even){background:oklch(95% 0.003 70)}
.markdown-body hr{margin:28px 0;border:none;border-top:1px solid var(--border)}
.markdown-body a{color:var(--accent);text-decoration:underline;text-underline-offset:2px}
.markdown-body a:hover{color:var(--accent-hover)}

/* ===== EDIT MODE ===== */
.markdown-edit{display:none;max-width:780px;margin:0 auto}
.markdown-edit.active{display:block}
.md-toolbar{
  display:flex;gap:4px;padding:8px 0;border-bottom:1px solid var(--border);
  margin-bottom:12px;flex-wrap:wrap;
}
.md-toolbar button{
  width:32px;height:32px;
  display:flex;align-items:center;justify-content:center;
  border:none;background:none;cursor:pointer;
  border-radius:4px;font-size:14px;color:var(--muted);
}
.md-toolbar button:hover{background:var(--hover);color:var(--fg)}
.md-editor{
  width:100%;min-height:calc(100vh - 300px);
  padding:16px;
  font-family:'JetBrains Mono','SF Mono','Fira Code',ui-monospace,monospace;
  font-size:14px;line-height:1.7;
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  background:var(--surface);
  color:var(--fg);
  resize:vertical;
  outline:none;
  transition:border-color 0.15s;
}
.md-editor:focus{border-color:var(--accent)}
.edit-status{
  font-size:12px;color:var(--muted);
  padding:6px 0;text-align:right;
}
.edit-status.saved{color:var(--green)}
.edit-status.saving{color:var(--accent2)}

/* ===== FLOATING TOOLBAR ===== */
.float-toolbar{
  position:absolute;right:16px;top:50%;transform:translateY(-50%);
  display:flex;flex-direction:column;gap:4px;
  z-index:20;
}
.ft-btn{
  width:38px;height:38px;
  display:flex;align-items:center;justify-content:center;
  border:1px solid var(--border);
  border-radius:10px;
  background:var(--surface);
  color:var(--muted);
  font-size:16px;
  cursor:pointer;
  position:relative;
  transition:all 0.15s;
  box-shadow:0 1px 4px oklch(0% 0 0 / 0.04);
}
.ft-btn:hover{background:var(--hover);color:var(--fg);border-color:color-mix(in oklch, var(--border) 60%, var(--fg))}
.ft-btn.active{background:var(--accent-soft);border-color:var(--accent);color:var(--accent)}
.ft-btn .tooltip{
  position:absolute;right:calc(100% + 10px);top:50%;transform:translateY(-50%);
  padding:4px 10px;border-radius:6px;
  background:var(--fg);color:var(--surface);
  font-size:12px;font-weight:500;white-space:nowrap;
  pointer-events:none;opacity:0;
  transition:opacity 0.15s;
}
.ft-btn:hover .tooltip{opacity:1}
/* RAG state */
.ft-btn.rag-off{color:var(--muted);border-color:var(--border)}
.ft-btn.rag-on{color:var(--green);border-color:var(--green)}
.ft-btn.rag-on::after{
  content:'';position:absolute;top:4px;right:4px;
  width:6px;height:6px;border-radius:50%;
  background:var(--green);
}
.ft-btn.rag-loading{color:var(--accent2)}
.ft-btn.rag-loading .rag-spinner{
  animation:ragSpin 1s linear infinite;
}
@keyframes ragSpin{to{transform:rotate(360deg)}}

/* Saved indicator on edit btn */
.ft-btn.done-state{border-color:var(--green);color:var(--green)}

/* ===== OUTLINE PANEL ===== */
.outline-panel{
  width:0;overflow:hidden;
  border-left:1px solid var(--border);
  background:var(--surface);
  transition:width 0.2s;
  flex-shrink:0;
}
.outline-panel.open{width:220px}
.outline-header{
  padding:14px 16px;font-size:13px;font-weight:600;
  border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
}
.outline-header button{
  width:24px;height:24px;border:none;background:none;cursor:pointer;
  border-radius:4px;font-size:14px;color:var(--muted);
}
.outline-header button:hover{background:var(--hover)}
.outline-content{padding:8px 0;overflow-y:auto;max-height:calc(100vh - 200px)}
.outline-item{
  padding:5px 16px;font-size:13px;cursor:pointer;
  color:var(--muted);transition:all 0.1s;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.outline-item:hover{color:var(--fg);background:var(--hover)}
.outline-item.active{color:var(--accent);font-weight:500;background:var(--accent-soft)}
.outline-item.h1{padding-left:16px;font-weight:600}
.outline-item.h2{padding-left:32px;font-size:12.5px}
.outline-item.h3{padding-left:48px;font-size:12px}
.outline-item.h4{padding-left:64px;font-size:12px}

/* ===== CHAT PANEL ===== */
.chat-overlay{
  position:fixed;inset:0;z-index:100;
  background:oklch(0% 0 0 / 0.15);
  display:none;
  backdrop-filter:blur(2px);
}
.chat-overlay.open{display:block}
.chat-panel{
  position:fixed;bottom:0;right:24px;
  width:380px;height:520px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius) var(--radius) 0 0;
  box-shadow:var(--shadow-lg);
  display:none;flex-direction:column;
  z-index:110;
  animation:chatSlideUp 0.25s;
}
.chat-panel.open{display:flex}
@keyframes chatSlideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.chat-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;
  border-bottom:1px solid var(--border);
}
.chat-header .chat-title{font-size:14px;font-weight:600}
.chat-header .chat-close{
  width:30px;height:30px;border:none;background:none;cursor:pointer;
  border-radius:6px;font-size:16px;color:var(--muted);
}
.chat-header .chat-close:hover{background:var(--hover);color:var(--fg)}
.chat-messages{
  flex:1;overflow-y:auto;padding:16px;
  display:flex;flex-direction:column;gap:12px;
}
.msg{
  max-width:85%;padding:10px 14px;
  border-radius:12px;font-size:14px;line-height:1.6;
  animation:msgIn 0.2s;
}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.assistant{
  align-self:flex-start;
  background:var(--tag-bg);
  color:var(--fg);
  border-bottom-left-radius:4px;
}
.msg.user{
  align-self:flex-end;
  background:var(--accent);
  color:white;
  border-bottom-right-radius:4px;
}
.chat-input-area{
  display:flex;gap:8px;padding:12px 16px;
  border-top:1px solid var(--border);
}
.chat-input-area input{
  flex:1;height:38px;padding:0 14px;
  font-size:14px;font-family:inherit;
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  background:var(--bg);
  color:var(--fg);
  outline:none;
}
.chat-input-area input:focus{border-color:var(--accent)}
.chat-input-area .chat-send{
  width:38px;height:38px;
  display:flex;align-items:center;justify-content:center;
  border:none;border-radius:var(--radius-sm);
  background:var(--accent);color:white;cursor:pointer;
  font-size:16px;
}
.chat-input-area .chat-send:hover{background:var(--accent-hover)}
.chat-context-hint{
  font-size:11px;color:var(--muted);padding:4px 16px 0;
  text-align:center;
}

/* ===== SHARE MODAL ===== */
.share-overlay{
  position:fixed;inset:0;z-index:200;
  background:oklch(0% 0 0 / 0.35);
  display:none;align-items:center;justify-content:center;
  backdrop-filter:blur(4px);
}
.share-overlay.open{display:flex}
.share-modal{
  background:var(--surface);
  border-radius:16px;
  width:400px;max-width:90vw;
  padding:28px;
  box-shadow:var(--shadow-lg);
  animation:slideUp 0.25s;
}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.share-title{font-size:17px;font-weight:680;margin-bottom:6px}
.share-desc{font-size:13px;color:var(--muted);margin-bottom:20px}
.share-link-row{
  display:flex;gap:8px;margin-bottom:12px;
}
.share-link-row input{
  flex:1;height:38px;padding:0 12px;
  font-size:13px;border:1px solid var(--border);
  border-radius:var(--radius-sm);
  background:var(--bg);color:var(--fg);
  outline:none;
}
.share-link-row button{
  height:38px;padding:0 16px;
  background:var(--accent);color:white;border:none;
  border-radius:var(--radius-sm);cursor:pointer;
  font-size:13px;font-weight:500;
}
.share-link-row button:hover{background:var(--accent-hover)}
.share-options{display:flex;flex-direction:column;gap:8px}
.share-opt{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  cursor:pointer;transition:background 0.1s;
}
.share-opt:hover{background:var(--hover)}
.share-opt .opt-icon{font-size:18px}
.share-opt .opt-text{font-size:13px;color:var(--fg);flex:1}
.share-opt .opt-desc{font-size:11px;color:var(--muted)}

/* ===== RESPONSIVE ===== */
@media(max-width:900px){
  .tree-panel{width:240px}
  .outline-panel.open{width:180px}
  .markdown-area{padding:24px 20px 60px}
  .float-toolbar{right:8px}
  .float-toolbar .ft-btn{width:34px;height:34px;font-size:14px}
  .float-toolbar .ft-btn .tooltip{display:none}
  .chat-panel{width:340px;height:440px;right:12px}
}
@media(max-width:640px){
  .tree-panel{width:200px}
  .outline-panel.open{width:160px}
  .markdown-area{padding:16px 12px 60px}
  .chat-panel{width:calc(100vw - 24px);right:12px;height:400px}
}
/* ===== LUCIDE ICONS ===== */
.lucide-icon{display:inline-flex;width:1em;height:1em;vertical-align:middle;stroke-width:1.5;pointer-events:none}
.ft-btn .lucide-icon{width:18px;height:18px}
.tree-row .lucide-icon{width:14px;height:14px;flex-shrink:0}
.tree-row .lucide-icon.folder-icon{width:16px;height:16px}
.back-btn .lucide-icon{width:14px;height:14px}
.hdr-btn .lucide-icon{width:15px;height:15px}
.md-toolbar .lucide-icon{width:15px;height:15px}
.share-opt .lucide-icon{width:18px;height:18px}
.chat-panel .lucide-icon{width:16px;height:16px}
</style>
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<div id="app">
  <!-- ===== TOP NAV ===== -->
  <header class="detail-header">
    <button class="back-btn" onclick="goBack()"><i data-lucide="arrow-left" class="lucide-icon"></i> 返回</button>
    <span class="kb-title" id="kb-title">设计系统笔记</span>
    <div class="header-actions">
      <button class="hdr-btn" onclick="toast('编辑知识库信息')"><i data-lucide="pencil" class="lucide-icon"></i> 编辑信息</button>
      <button class="hdr-btn hdr-btn-primary" onclick="vectorizeAll()"><i data-lucide="zap" class="lucide-icon"></i> 全部向量化</button>
      <button class="hdr-btn hdr-btn-icon"><i data-lucide="more-vertical" class="lucide-icon"></i></button>
    </div>
  </header>

  <div class="detail-body">
    <!-- ===== TREE PANEL ===== -->
    <aside class="tree-panel" id="tree-panel">
      <div class="tree-search">
        <i data-lucide="search" class="lucide-icon search-icon" style="position:absolute;left:22px;top:50%;transform:translateY(-50%);color:var(--muted);width:14px;height:14px;pointer-events:none"></i>
        <input type="text" id="tree-search" placeholder="搜索文件..." oninput="filterTree(this.value)">
      </div>
      <div class="tree-content" id="tree-content"></div>
      <div class="tree-toolbar">
        <button class="hdr-btn" onclick="newFolder()" style="flex:1"><i data-lucide="folder-plus" class="lucide-icon"></i> 新建文件夹</button>
        <button class="hdr-btn" onclick="newFile()" style="flex:1"><i data-lucide="file-plus" class="lucide-icon"></i> 新建文件</button>
      </div>
    </aside>

    <!-- ===== RESIZE HANDLE ===== -->
    <div class="resize-handle" id="resize-handle"></div>

    <!-- ===== CONTENT PANEL ===== -->
    <main class="content-panel" id="content-panel">
      <div class="markdown-area" id="markdown-area">
        <!-- VIEW MODE -->
        <div class="markdown-body" id="markdown-view"></div>
        <!-- EDIT MODE -->
        <div class="markdown-edit" id="markdown-edit">
          <div class="md-toolbar">
            <button title="标题" onclick="insertMd('# ')"><i data-lucide="heading" class="lucide-icon"></i></button>
            <button title="加粗" onclick="insertMd('**','**')"><i data-lucide="bold" class="lucide-icon"></i></button>

<script>
// ===== SAMPLE DATA =====
const sampleMd = `# 设计原则

## 1. 以用户为中心

所有设计决策都应基于用户需求和目标。在开始设计之前，我们需要充分理解用户的使用场景、痛点和期望。

这不仅意味着做用户研究，更意味着将用户视角融入每一个设计决策中——从信息架构到微文案。

## 2. 一致性

保持界面元素、交互模式和视觉语言的一致性，降低用户的学习成本。

### 2.1 视觉一致性

- 使用统一的色彩系统和字体层级
- 保持一致的间距、圆角和阴影规范
- 图标风格和表达方式统一

### 2.2 交互一致性

- 相似的操作产生相似的反馈
- 遵循平台交互惯例
- 导航模式清晰可预测

## 3. 即时反馈

每个用户操作都应有即时、清晰、有意义的反馈。

| 操作类型 | 反馈方式 | 响应时间 |
|---------|---------|---------|
| 点击 | 视觉状态变化 | < 100ms |
| 表单提交 | 加载状态 | < 1s |
| 错误 | 错误提示 | 即时 |

## 4. 容错性

帮助用户避免错误，并在错误发生时提供有建设性的恢复方案。

> 「好的设计是尽可能少的设计」— Dieter Rams

> 「设计不只是它看起来怎样，还在于它如何工作。」— Steve Jobs

\`\`\`css
:root {
  --space-unit: 8px;
  --radius-sm: 4px;
  --radius-md: 8px;
  --color-primary: oklch(54% 0.14 30);
}
\`\`\`

## 5. 用户可控性

用户应始终掌控系统的状态，而非被系统控制。

- 提供明确的退出和撤销操作
- 重要操作前给予确认
- 允许用户自定义偏好设置`;

const treeData = [
  { id:'f1', name:'基础', type:'folder', expanded:true, children:[
    { id:'d1', name:'色彩系统', type:'file', vectorized:true },
    { id:'d2', name:'字体排版', type:'file', vectorized:false },
    { id:'d3', name:'间距和网格', type:'file', vectorized:true },
  ]},
  { id:'f2', name:'组件', type:'folder', expanded:true, children:[
    { id:'d4', name:'Button组件规范', type:'file', vectorized:false },
    { id:'d5', name:'Form设计指南', type:'file', vectorized:true },
    { id:'d6', name:'导航模式', type:'file', vectorized:false },
  ]},
  { id:'d7', name:'最佳实践', type:'file', vectorized:false },
  { id:'d8', name:'设计原则', type:'file', vectorized:true },
];

// ===== STATE =====
let state = {
  tree: JSON.parse(JSON.stringify(treeData)),
  selectedId: 'd8',
  currentMd: sampleMd,
  isEditing: false,
  isLiked: true,
  isVectorized: true,

  chatOpen: false,

// ===== RENDER TREE =====
function renderTree(filter = '') {
  const container = document.getElementById('tree-content');
  const html = buildTreeHtml(state.tree, 0, filter);
  container.innerHTML = html || '<div class="tree-empty">暂无文件<br>点击下方按钮创建</div>';
  lucide.createIcons();
}

function buildTreeHtml(nodes, depth, filter) {
  if (!nodes || nodes.length === 0) return '';
  let html = '';
  for (const node of nodes) {
    const matches = filter ? node.name.toLowerCase().includes(filter.toLowerCase()) : true;
    const childrenMatch = filter && node.children
      ? node.children.some(c => c.name.toLowerCase().includes(filter.toLowerCase())) : false;
    const show = !filter || matches || childrenMatch;
    if (!show) continue;

    const isFolder = node.type === 'folder';
    const exp = isFolder && node.expanded;
    const sel = node.id === state.selectedId;
    const vecClass = node.vectorized ? 'active' : '';

    html += `<div class="tree-node" data-id="${node.id}">`;
    html += `<div class="tree-row${sel?' selected':''}" onclick="selectNode('${node.id}')">`;
    html += `<span class="indent" style="width:${depth*16}px;flex-shrink:0"></span>`;
    if (isFolder) {
      html += `<span class="toggle-btn${exp?' expanded':''}" onclick="event.stopPropagation();toggleFolder('${node.id}')"><i data-lucide="chevron-right" style="width:10px;height:10px"></i></span>`;
    } else {
      html += `<span style="width:20px;flex-shrink:0"></span>`;
    }
    html += `<span class="node-icon">${isFolder ? (exp ? '<i data-lucide="folder-open" class="lucide-icon folder-icon"></i>' : '<i data-lucide="folder" class="lucide-icon folder-icon"></i>') : '<i data-lucide="file-text" class="lucide-icon folder-icon"></i>'}</span>`;
    html += `<span class="vector-badge ${vecClass}"></span>`;
    html += `<span class="node-name">${node.name}${!isFolder && node.vectorized ? '' : ''}</span>`;
    html += `<span class="row-actions">`;
    if (isFolder) {
      html += `<button onclick="event.stopPropagation();addChild('${node.id}')" title="新建子文件夹"><i data-lucide="plus" class="lucide-icon" style="width:12px;height:12px"></i></button>`;
    }
    html += `<button onclick="event.stopPropagation();renameNode('${node.id}')" title="重命名"><i data-lucide="pencil" class="lucide-icon" style="width:12px;height:12px"></i></button>`;
    html += `<button onclick="event.stopPropagation();deleteNode('${node.id}')" title="删除"><i data-lucide="trash-2" class="lucide-icon" style="width:12px;height:12px"></i></button>`;
    html += `</span></div>`;
    if (isFolder && node.children) {
      html += `<div class="tree-children${exp?'':' collapsed'}">`;
      html += buildTreeHtml(node.children, depth + 1, filter);
      html += `</div>`;
    }
    html += `</div>`;
  }
  return html;
}

// ===== TREE INTERACTIONS =====
function selectNode(id) {
  state.selectedId = id;
  renderTree(document.getElementById('tree-search').value);
  const node = findNode(state.tree, id);
  if (node && node.type === 'file') {
    state.currentDoc = node.name;
    // Load corresponding content
    loadDocContent(id);
  }
}

function toggleFolder(id) {
  const node = findNode(state.tree, id);
  if (node) { node.expanded = !node.expanded; renderTree(document.getElementById('tree-search').value); }
}

function findNode(nodes, id) {
  for (const n of nodes) {
    if (n.id === id) return n;
    if (n.children) { const found = findNode(n.children, id); if (found) return found; }
  }
  return null;
}

function findParent(nodes, id, parent = null) {
  for (const n of nodes) {
    if (n.id === id) return parent;
    if (n.children) { const found = findParent(n.children, id, n); if (found) return found; }
  }
  return null;
}

function filterTree(query) { renderTree(query) }

function newFolder() {
  const parentId = state.selectedId;
  const parent = findNode(state.tree, parentId);
  const target = (parent && parent.type === 'folder') ? parent : null;
  const name = prompt('文件夹名称：');
  if (!name || !name.trim()) return;
  const id = 'f' + Date.now();
  const newNode = { id, name: name.trim(), type:'folder', expanded:true, children:[] };
  if (target) {
    if (!target.children) target.children = [];
    target.children.push(newNode);
  } else {
    state.tree.push(newNode);
  }
  renderTree(document.getElementById('tree-search').value);
}

function newFile() {
  const parentId = state.selectedId;
  const parent = findNode(state.tree, parentId);
  const target = (parent && parent.type === 'folder') ? parent : null;
  const name = prompt('文件名（不加 .md）：');
  if (!name || !name.trim()) return;
  const id = 'd' + Date.now();
  const newNode = { id, name: name.trim(), type:'file', vectorized:false };
  if (target) {
    if (!target.children) target.children = [];
    target.children.push(newNode);
  } else {
    state.tree.push(newNode);
  }
  renderTree(document.getElementById('tree-search').value);
}

function addChild(folderId) { state.selectedId = folderId; newFolder() }

function renameNode(id) {
  const node = findNode(state.tree, id);
  if (!node) return;
  const name = prompt('重命名：', node.name);
  if (!name || !name.trim()) return;
  node.name = name.trim();
  renderTree(document.getElementById('tree-search').value);
  if (id === state.selectedId && node.type === 'file') {
    state.currentDoc = node.name;
    document.getElementById('kb-title').textContent = state.currentDoc;
  }
}

function deleteNode(id) {
  if (!confirm('确定删除？')) return;
  const remove = (nodes) => {
    for (let i = nodes.length - 1; i >= 0; i--) {
      if (nodes[i].id === id) { nodes.splice(i,1); return true; }
      if (nodes[i].children && remove(nodes[i].children)) return true;
    }
    return false;
  };
  remove(state.tree);
  if (state.selectedId === id) {
    state.selectedId = null;
    loadDocContent(null);
  }
  renderTree(document.getElementById('tree-search').value);
}

// ===== DOC CONTENT =====
function loadDocContent(id) {
  // Different dummy contents per doc
  const docs = {
    'd1': `# 色彩系统\n\n## 主色\n\n暖陶色作为品牌主色调，传递温暖和亲近感。\n\n## 辅助色\n\n- 鼠尾草绿：用于成功状态和正向反馈\n- 雾蓝色：用于信息提示和链接\n- 暖金色：用于警告和高亮\n\n## 色彩 Token\n\n\`\`\`css\n--color-primary: oklch(54% 0.14 30);\n--color-success: oklch(55% 0.12 150);\n--color-info: oklch(52% 0.10 245);\n\`\`\``,
    'd2': `# 字体排版\n\n## 字体栈\n\n- 显示字体：Söhne, Avenir Next, system-ui\n- 正文字体：-apple-system, system-ui, sans-serif\n- 等宽字体：JetBrains Mono, SF Mono\n\n## 层级\n\n| 层级 | 大小 | 字重 |\n|-----|------|------|\n| H1 | 28px | 720 |\n| H2 | 20px | 680 |\n| Body | 15px | 400 |\n| Small | 13px | 400 |`,

    'd4': `# Button 组件规范\n\n## 变体\n\n1. 实心按钮（Primary）\n2. 轮廓按钮（Outline）\n3. 文字按钮（Ghost）\n\n## 尺寸\n\n- 小：h-32px, px-12\n- 中：h-38px, px-18\n- 大：h-46px, px-24`,
    'd5': `# Form 设计指南\n\n## 布局\n\n- 标签在上，输入框在下\n- 相关字段分组展示\n- 错误信息显示在字段下方\n\n## 验证\n\n- 输入即验（失焦时）\n- 提交时全量验证`,
    'd6': `# 导航模式\n\n## 全局导航\n\n顶部导航栏包含：Logo、主导航入口、用户头像。\n\n## 侧边导航\n\n- 知识库详情页左侧树形导航\n- 可折叠、可搜索、支持拖拽排序`,
    'd7': `# 最佳实践\n\n1. **组件复用优先** — 避免重复造轮子\n2. **渐进式披露** — 复杂度逐步展现\n3. **一致的交互语言** — 同样的操作对应同样的反馈\n4. **无障碍设计** — 色彩对比度至少 4.5:1`,
    'd8': sampleMd,
  };
  const md = docs[id];
  if (md) {
    state.currentMd = md;
    renderMarkdown(md);
    renderOutline(md);
  } else {
    document.getElementById('markdown-view').innerHTML = '<p style="color:var(--muted);padding:40px;text-align:center">选择一个文件查看内容</p>';
    document.getElementById('outline-content').innerHTML = '';
  }
  // Reset edit mode
  if (state.isEditing) toggleEdit();
}

// ===== MARKDOWN RENDERER =====
function renderMarkdown(md) {
  const view = document.getElementById('markdown-view');
  view.innerHTML = mdToHtml(md);
  // Update outline
  renderOutline(md);
}

function mdToHtml(md) {
  let html = md
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  // Store code blocks
  const codeBlocks = [];
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
    const idx = codeBlocks.length;
    codeBlocks.push(`<pre><code>${code.trim()}</code></pre>`);
    return `\n<!--CODEBLOCK${idx}-->\n`;
  });

  // Store table blocks (consecutive |‑lines)
  const tables = [];
  html = html.replace(/((?:^\|.+\|(?:\n|$))+)/gm, (block) => {
    const lines = block.trim().split('\n').map(l => l.replace(/^\||\|$/g,'').trim());
    if (lines.length < 2) return block; // need at least header + separator
    // Second line is the separator — validate
    if (!/^[-:| ]+$/.test(lines[1].replace(/\|/g,''))) return block;
    const headCells = lines[0].split('|').map(c => c.trim()).filter(c => c);
    const body = lines.slice(2).map(row =>
      '<tr>' + row.split('|').map(c => c.trim()).filter(c => c).map(c => `<td>${c}</td>`).join('') + '</tr>'
    ).join('');
    const idx = tables.length;
    tables.push(`<table><thead><tr>${headCells.map(c => `<th>${c}</th>`).join('')}</tr></thead><tbody>${body}</tbody></table>`);
    return `\n<!--TABLE${idx}-->\n`;
  });

  // Headers
  html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

  // Horizontal rules
  html = html.replace(/^---$/gm, '<hr>');

  // Blockquotes
  html = html.replace(/^> (.+)$/gm, '<blockquote><p>$1</p></blockquote>');

  // Unordered lists
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
  html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>\n$1</ul>\n');
  html = html.replace(/<\/ul>\n*<ul>/g, '');

  // Ordered lists
  html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');

  // Inline formatting
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  html = html.replace(/`(.+?)`/g, '<code>$1</code>');
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');

  // Restore code blocks & tables
  html = html.replace(/<!--CODEBLOCK(\d+)-->/g, (_, idx) => codeBlocks[parseInt(idx)]);
  html = html.replace(/<!--TABLE(\d+)-->/g, (_, idx) => tables[parseInt(idx)]);

  // Wrap remaining text lines in paragraphs
  const blk = new Set(['h1','h2','h3','h4','h5','h6','pre','table','thead','tbody','blockquote','hr','ul','ol','li','tr','th','td']);
  const lines = html.split('\n');
  let result = '';
  for (let line of lines) {
    const t = line.trim();
    if (!t) { result += '\n'; continue; }
    const tag = t.match(/^<(\w+)/)?.[1];
    if (tag && blk.has(tag)) { result += t + '\n'; continue; }
    result += `<p>${t}</p>\n`;
  }

  return result;
}

// ===== OUTLINE =====
function renderOutline(md) {
  const lines = md.split('\n');
  const headings = [];
  for (const line of lines) {
    const m = line.match(/^(#{1,6})\s+(.+)$/);
    if (m) headings.push({ level: m[1].length, text: m[2] });
  }
  const container = document.getElementById('outline-content');
  container.innerHTML = headings.map(h =>
    `<div class="outline-item h${h.level}" onclick="scrollToHeading('${h.text}',${h.level})">${h.text}</div>`
  ).join('');
}

function scrollToHeading(text, level) {
  const view = document.getElementById('markdown-view');
  const headings = view.querySelectorAll(`h${level}`);
  for (const h of headings) {
    if (h.textContent.trim() === text) {
      h.scrollIntoView({ behavior:'smooth', block:'center' });
      h.style.transition = 'background 0.5s';
      h.style.background = 'var(--accent-soft)';
      setTimeout(() => h.style.background = '', 1000);
      break;
    }
  }
  document.querySelectorAll('.outline-item').forEach(el => el.classList.remove('active'));
  // Mark active - simple approach: match text
  document.querySelectorAll('.outline-item').forEach(el => {
    if (el.textContent.trim() === text) el.classList.add('active');
  });
}

// ===== FLOATING TOOLBAR =====
function toggleEdit() {
  state.isEditing = !state.isEditing;
  const view = document.getElementById('markdown-view');
  const edit = document.getElementById('markdown-edit');
  const editor = document.getElementById('md-editor');
  const ftEdit = document.getElementById('ft-edit');

  if (state.isEditing) {
    view.style.display = 'none';
    edit.classList.add('active');
    editor.value = state.currentMd;
    editor.focus();
    ftEdit.innerHTML = '<i data-lucide="check" class="lucide-icon"></i> <span class="tooltip">完成编辑</span>';
    ftEdit.classList.add('done-state');
    lucide.createIcons();
    document.getElementById('edit-status').textContent = '编辑中…';
    document.getElementById('edit-status').className = 'edit-status';
  } else {
    state.currentMd = editor.value;
    view.style.display = '';
    edit.classList.remove('active');
    renderMarkdown(state.currentMd);
    ftEdit.innerHTML = '<i data-lucide="pencil" class="lucide-icon"></i> <span class="tooltip">编辑</span>';
    ftEdit.classList.remove('done-state');
    lucide.createIcons();
    document.getElementById('edit-status').textContent = '';
  }
}

// Auto-save
let saveTimer;
document.addEventListener('input', function(e) {
  if (e.target.id === 'md-editor') {
    clearTimeout(saveTimer);
    const status = document.getElementById('edit-status');
    status.textContent = '自动保存中…';
    status.className = 'edit-status saving';
    saveTimer = setTimeout(() => {
      state.currentMd = e.target.value;
      status.textContent = '已保存';
      status.className = 'edit-status saved';
    }, 2000);
  }
});

function insertMd(before, after = '') {
  const editor = document.getElementById('md-editor');
  const start = editor.selectionStart;
  const end = editor.selectionEnd;
  const selected = editor.value.substring(start, end);
  editor.value = editor.value.substring(0, start) + before + selected + after + editor.value.substring(end);
  editor.focus();
  const newPos = start + before.length + selected.length + after.length;
  editor.setSelectionRange(start + before.length, newPos);
}

function toggleOutline() {
  state.outlineOpen = !state.outlineOpen;
  document.getElementById('outline-panel').classList.toggle('open', state.outlineOpen);
  document.getElementById('ft-outline').classList.toggle('active', state.outlineOpen);
}

function openShare() {
  document.getElementById('share-overlay').classList.add('open');
}

function closeShare() {
  document.getElementById('share-overlay').classList.remove('open');
}

function copyShareLink() {
  const input = document.getElementById('share-link');
  input.select();
  navigator.clipboard?.writeText(input.value);
  toast('链接已复制');
}

function exportAsImage() { toast('正在生成分享图片…'); }
function exportDoc() { toast('导出格式：Markdown / PDF / HTML'); }

function toggleLike() {
  state.isLiked = !state.isLiked;
  const btn = document.getElementById('ft-like');
  btn.innerHTML = state.isLiked
    ? '<i data-lucide="heart" fill="currentColor" class="lucide-icon"></i> <span class="tooltip">取消收藏</span>'
    : '<i data-lucide="heart" class="lucide-icon"></i> <span class="tooltip">收藏</span>';
  btn.classList.toggle('active', state.isLiked);
  lucide.createIcons();
  toast(state.isLiked ? '已收藏' : '已取消收藏');
}

// ===== AI CHAT =====
function toggleChat() {
  state.chatOpen = !state.chatOpen;
  document.getElementById('chat-panel').classList.toggle('open', state.chatOpen);
  document.getElementById('chat-overlay').classList.toggle('open', state.chatOpen);
  document.getElementById('ft-chat').classList.toggle('active', state.chatOpen);
  if (state.chatOpen) setTimeout(() => document.getElementById('chat-input').focus(), 300);
}

function closeChat() {
  state.chatOpen = false;
  document.getElementById('chat-panel').classList.remove('open');
  document.getElementById('chat-overlay').classList.remove('open');
  document.getElementById('ft-chat').classList.remove('active');
}

function sendChat() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  const container = document.getElementById('chat-messages');
  container.innerHTML += `<div class="msg user">${escapeHtml(msg)}</div>`;
  container.scrollTop = container.scrollHeight;

  // Simulate response
  setTimeout(() => {
    const responses = [
      '根据文档「设计原则」的内容，我可以从以下几个方面回答你的问题：\n\n1. **以用户为中心** — 所有设计决策应基于用户需求\n2. **一致性** — 保持视觉和交互的一致性\n3. **即时反馈** — 每个操作都应有清晰反馈',
      '文档中提到了 **一致性** 的两个层面：视觉一致性和交互一致性。视觉方面包括统一的色彩系统、间距和阴影规范；交互方面包括相似操作产生相似反馈、遵循平台惯例等。',
      '这是一个很好的问题！根据「容错性」原则，我们应该帮助用户避免错误，并在错误发生时提供有建设性的恢复方案。例如提供撤销操作、重要操作前给予确认等。',
      '总结一下「设计原则」文档的核心要点：\n\n1. 🎯 以用户为中心\n2. 🔄 一致性\n3. ⚡ 即时反馈\n4. 🛡️ 容错性\n5. 🎮 用户可控性\n\n这些原则共同构成了我们设计系统的基础。',
    ];
    const resp = responses[Math.floor(Math.random() * responses.length)];
    container.innerHTML += `<div class="msg assistant">${resp}</div>`;
    container.scrollTop = container.scrollHeight;
  }, 800 + Math.random() * 400);
}

// ===== RAG VECTORIZE =====
function toggleRag() {
  state.isVectorized = !state.isVectorized;
  const btn = document.getElementById('ft-rag');
  if (state.isVectorized) {
    btn.className = 'ft-btn rag-on rag-loading';
    btn.innerHTML = '<i data-lucide="loader" class="lucide-icon rag-spinner"></i> <span class="tooltip">正在向量化…</span>';
    lucide.createIcons();
    // Simulate completion
    setTimeout(() => {
      btn.className = 'ft-btn rag-on';
      btn.innerHTML = '<i data-lucide="zap" class="lucide-icon"></i> <span class="tooltip">已向量化 — 点击移除</span>';
      toast('「设计原则」已加入 RAG 索引');
      lucide.createIcons();
      // Update tree badge
      const node = findNode(state.tree, 'd8');
      if (node) { node.vectorized = true; renderTree(document.getElementById('tree-search').value); }
    }, 1500);
  } else {
    btn.className = 'ft-btn rag-off';
    btn.innerHTML = '<i data-lucide="zap" class="lucide-icon"></i> <span class="tooltip">向量化到 RAG</span>';
    toast('已从 RAG 索引移除');
    lucide.createIcons();
    const node = findNode(state.tree, 'd8');
    if (node) { node.vectorized = false; renderTree(document.getElementById('tree-search').value); }
  }
}

function vectorizeAll() {
  toast('正在向量化全部文件…');
  setTimeout(() => {
    const markAll = (nodes) => {
      for (const n of nodes) {
        if (n.type === 'file') n.vectorized = true;
        if (n.children) markAll(n.children);
      }
    };
    markAll(state.tree);
    state.isVectorized = true;
    renderTree(document.getElementById('tree-search').value);
    toast('全部文件已向量化 ✓');
  }, 2000);
}

// ===== RESIZE =====
let isResizing = false;
document.getElementById('resize-handle').addEventListener('mousedown', (e) => {
  isResizing = true;
  document.body.style.cursor = 'col-resize';
  document.getElementById('resize-handle').classList.add('resizing');
  document.addEventListener('mousemove', onResize);
  document.addEventListener('mouseup', stopResize);
  e.preventDefault();
});

function onResize(e) {
  if (!isResizing) return;
  const panel = document.getElementById('tree-panel');
  let w = e.clientX;
  w = Math.max(200, Math.min(500, w));
  panel.style.width = w + 'px';
}

function stopResize() {
  isResizing = false;
  document.body.style.cursor = '';
  document.getElementById('resize-handle').classList.remove('resizing');
  document.removeEventListener('mousemove', onResize);
  document.removeEventListener('mouseup', stopResize);
}

// ===== UTILITIES =====
function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function toast(msg) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  Object.assign(t.style, {
    position:'fixed', bottom:'24px', left:'50%', transform:'translateX(-50%)',
    padding:'10px 20px', borderRadius:'8px',
    background:'oklch(17% 0.012 55)', color:'oklch(99% 0.003 78)',
    fontSize:'13px', fontWeight:'500', zIndex:'300',
    boxShadow:'0 8px 30px oklch(0% 0 0 / 0.1)',
    animation:'toastIn 0.2s',
  });
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

function goBack() {
  window.location.href = 'index.html';
}

// ===== KEYBOARD =====
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (document.getElementById('share-overlay').classList.contains('open')) closeShare();
    if (state.chatOpen) closeChat();
    if (state.outlineOpen) toggleOutline();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    if (state.isEditing) toggleEdit();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'b' && state.isEditing) {
    e.preventDefault(); insertMd('**','**');
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'i' && state.isEditing) {
    e.preventDefault(); insertMd('*','*');
  }
});

// ===== INIT =====
const params = new URLSearchParams(window.location.search);
const kbName = params.get('kb');
if (kbName) document.getElementById('kb-title').textContent = decodeURIComponent(kbName);

renderTree();
renderMarkdown(state.currentMd);
renderOutline(state.currentMd);
lucide.createIcons();
// Select default
const defaultEl = document.querySelector('.tree-row.selected');
if (defaultEl) defaultEl.scrollIntoView({block:'center'});

// Toast style
const style = document.createElement('style');
style.textContent = `@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}`;
document.head.appendChild(style);
</script>
