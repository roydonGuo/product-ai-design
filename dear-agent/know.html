<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KnowFlow — AI Agent 知识库</title>
  <style>
    /* ============================================
   MODERN-MINIMAL palette
   ============================================ */
    :root {
      --bg: oklch(99% 0.002 240);
      --surface: oklch(100% 0 0);
      --fg: oklch(18% 0.012 250);
      --muted: oklch(54% 0.012 250);
      --border: oklch(92% 0.005 250);
      --accent: oklch(58% 0.18 255);
      --accent-hover: oklch(52% 0.20 255);
      --accent-bg: oklch(58% 0.18 255 / 0.08);
      --danger: oklch(55% 0.20 25);
      --danger-bg: oklch(55% 0.20 25 / 0.08);
      --success: oklch(55% 0.18 145);
      --radius: 10px;
      --radius-sm: 6px;
      --shadow: 0 1px 3px oklch(0% 0 0 / 0.06), 0 1px 2px oklch(0% 0 0 / 0.04);
      --shadow-lg: 0 4px 16px oklch(0% 0 0 / 0.08);
      --transition: 0.2s ease;
      --font-display: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
      --font-body: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', 'SF Mono', ui-monospace, monospace;
      --tree-indent: 20px;
      --topbar-height: 52px;
    }

    /* dark mode overrides */
    [data-theme="dark"] {
      --bg: oklch(15% 0.008 250);
      --surface: oklch(20% 0.01 250);
      --fg: oklch(92% 0.005 250);
      --muted: oklch(60% 0.01 250);
      --border: oklch(28% 0.01 250);
      --accent: oklch(65% 0.18 255);
      --accent-hover: oklch(70% 0.18 255);
      --accent-bg: oklch(65% 0.18 255 / 0.12);
      --shadow: 0 1px 3px oklch(0% 0 0 / 0.2);
      --shadow-lg: 0 4px 16px oklch(0% 0 0 / 0.3);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--fg);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      transition: background var(--transition), color var(--transition);
    }

    input,
    textarea,
    button {
      font-family: inherit;
      font-size: inherit;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    /* ============================================
   Shared components
   ============================================ */
    .top-bar {
      height: var(--topbar-height);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      transition: background var(--transition), border var(--transition);
      flex-shrink: 0;
    }

    .logo {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 16px;
      letter-spacing: -0.02em;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .logo svg {
      flex-shrink: 0;
    }

    .icon-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 6px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
      font-size: 16px;
    }

    .icon-btn:hover {
      background: var(--accent-bg);
      color: var(--accent);
    }

    .icon-btn.active {
      color: var(--accent);
      background: var(--accent-bg);
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      font-weight: 510;
      font-size: 13px;
      cursor: pointer;
      transition: background var(--transition);
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
    }

    .btn-secondary {
      background: none;
      color: var(--fg);
      border: 1px solid var(--border);
      padding: 7px 16px;
      border-radius: var(--radius-sm);
      font-weight: 510;
      font-size: 13px;
      cursor: pointer;
      transition: all var(--transition);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-secondary:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    input[type="text"],
    input[type="search"],
    textarea {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--fg);
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      outline: none;
      transition: border var(--transition);
      width: 100%;
    }

    input:focus,
    textarea:focus {
      border-color: var(--accent);
    }

    ::placeholder {
      color: var(--muted);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 510;
      background: var(--accent-bg);
      color: var(--accent);
      letter-spacing: 0.02em;
    }

    .hidden {
      display: none !important;
    }

    /* ============================================
   Modal
   ============================================ */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: oklch(0% 0 0 / 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      width: 420px;
      max-width: 90vw;
      box-shadow: var(--shadow-lg);
      transition: background var(--transition), border var(--transition);
    }

    .modal h2 {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 16px;
      letter-spacing: -0.01em;
      margin-bottom: 16px;
    }

    .modal .field {
      margin-bottom: 14px;
    }

    .modal .field label {
      display: block;
      font-size: 12px;
      font-weight: 510;
      color: var(--muted);
      margin-bottom: 4px;
      letter-spacing: 0.02em;
    }

    .modal .field input,
    .modal .field textarea {
      font-size: 13px;
    }

    .modal .field textarea {
      resize: vertical;
      min-height: 60px;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 20px;
    }

    /* ============================================
   Screen 1 — KB List
   ============================================ */
    #screen-list {
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .top-bar-left {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
    }

    .top-bar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    .search-wrapper {
      flex: 1;
      min-width: 220px;
      position: relative;
    }

    .search-wrapper .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 14px;
      pointer-events: none;
    }

    .search-wrapper input {
      padding-left: 34px;
      font-size: 13px;
    }

    .view-toggle {
      display: flex;
      gap: 2px;
      background: var(--border);
      border-radius: var(--radius-sm);
      padding: 2px;
    }

    .view-toggle .icon-btn {
      border-radius: 4px;
      font-size: 14px;
      padding: 4px 8px;
    }

    .view-toggle .icon-btn.active {
      background: var(--surface);
      color: var(--fg);
      box-shadow: var(--shadow);
    }

    .tags-row {
      display: flex;
      gap: 6px;
      padding: 0 20px 12px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    .tag-chip {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 510;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      cursor: pointer;
      transition: all var(--transition);
    }

    .tag-chip:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .tag-chip.active {
      background: var(--accent-bg);
      border-color: var(--accent);
      color: var(--accent);
    }

    #kb-container {
      flex: 1;
      overflow-y: auto;
      padding: 0 20px 20px;
    }

    #kb-container.kb-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 12px;
      align-content: start;
    }

    #kb-container.kb-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .kb-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      cursor: pointer;
      transition: all var(--transition);
      position: relative;
    }

    .kb-card:hover {
      border-color: var(--accent);
      box-shadow: var(--shadow);
    }

    .kb-card.dragging {
      opacity: 0.4;
    }

    .kb-card.drag-over {
      border-color: var(--accent);
      border-style: dashed;
    }

    /* Card cover image */
    .kb-card-cover {
      height: 100px;
      margin: -18px -20px 14px;
      border-radius: var(--radius) var(--radius) 0 0;
      overflow: hidden;
      position: relative;
    }

    .kb-card-cover svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* Cover patterns — each KB gets a distinct abstract SVG pattern */
    .cover-circuit {
      background: linear-gradient(135deg, oklch(58% 0.18 255 / 0.08), oklch(58% 0.18 255 / 0.02));
    }

    .cover-dots {
      background: linear-gradient(135deg, oklch(55% 0.18 145 / 0.08), oklch(55% 0.18 145 / 0.02));
    }

    .cover-waves {
      background: linear-gradient(135deg, oklch(58% 0.18 255 / 0.10), oklch(55% 0.18 145 / 0.04));
    }

    .cover-circles {
      background: linear-gradient(135deg, oklch(55% 0.20 25 / 0.08), oklch(58% 0.18 255 / 0.03));
    }

    .cover-grid {
      background: linear-gradient(135deg, oklch(58% 0.18 255 / 0.10), oklch(65% 0.10 280 / 0.04));
    }

    /* List mode cover */
    .kb-list .kb-card-cover {
      width: 36px;
      height: 36px;
      margin: 0;
      border-radius: var(--radius-sm);
      flex-shrink: 0;
    }

    .kb-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }

    .kb-card-header h3 {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 15px;
      letter-spacing: -0.01em;
      color: var(--fg);
      line-height: 1.3;
    }

    .kb-card p {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .kb-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
    }

    .kb-tags {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .kb-menu {
      position: relative;
      flex-shrink: 0;
    }

    .kb-menu-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 4px;
      border-radius: var(--radius-sm);
      font-size: 16px;
      line-height: 1;
    }

    .kb-menu-btn:hover {
      background: var(--accent-bg);
      color: var(--accent);
    }

    .kb-dropdown {
      position: absolute;
      right: 0;
      top: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow-lg);
      padding: 4px;
      min-width: 120px;
      z-index: 10;
      display: none;
    }

    .kb-dropdown.open {
      display: block;
    }

    .kb-dropdown-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      font-size: 12px;
      border-radius: 4px;
      cursor: pointer;
      color: var(--fg);
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }

    .kb-dropdown-item:hover {
      background: var(--accent-bg);
      color: var(--accent);
    }

    .kb-dropdown-item.danger {
      color: var(--danger);
    }

    .kb-dropdown-item.danger:hover {
      background: var(--danger-bg);
    }

    /* list mode specific */
    .kb-list .kb-card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 16px;
      border-radius: var(--radius-sm);
    }

    .kb-list .kb-card-header h3 {
      font-size: 14px;
    }

    .kb-list .kb-card p {
      display: none;
    }

    .kb-list .kb-meta {
      margin-top: 0;
      white-space: nowrap;
    }

    .kb-list .kb-tags {
      margin-top: 0;
      flex-shrink: 0;
    }

    .kb-list .kb-card .kb-meta-files {
      display: none;
    }

    /* Cover picker in create modal */
    .cover-picker {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .cover-option {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      padding: 6px 8px;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--border);
      transition: all var(--transition);
      background: var(--bg);
    }

    .cover-option:hover {
      border-color: var(--accent);
    }

    .cover-option.active {
      border-color: var(--accent);
      background: var(--accent-bg);
    }

    .cover-option span {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    .cover-option.active span {
      color: var(--accent);
      font-weight: 510;
    }

    .cover-preview {
      width: 60px;
      height: 24px;
      border-radius: 3px;
      overflow: hidden;
    }

    .cover-preview svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty-state p {
      font-size: 14px;
    }

    /* ============================================
   Screen 2 — KB Detail
   ============================================ */
    #screen-detail {
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .detail-title {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 15px;
      letter-spacing: -0.01em;
      flex: 1;
    }

    .split-view {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* Tree panel (left) */
    .tree-panel {
      width: 300px;
      min-width: 220px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      background: var(--surface);
      transition: background var(--transition), border var(--transition);
      flex-shrink: 0;
    }

    .tree-search {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
    }

    .tree-search input {
      font-size: 12px;
      padding: 6px 10px;
    }

    .file-tree {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .tree-node {
      user-select: none;
    }

    .tree-node-content {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 8px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 13px;
      transition: background var(--transition);
      position: relative;
    }

    .tree-node-content:hover {
      background: var(--accent-bg);
    }

    .tree-node-content.active {
      background: var(--accent-bg);
      color: var(--accent);
      font-weight: 510;
    }

    .tree-node-icon {
      flex-shrink: 0;
      font-size: 14px;
      opacity: 0.7;
      color: var(--muted);
    }

    .tree-node-icon.folder-icon {
      color: var(--accent);
      opacity: 0.8;
    }

    .tree-node-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tree-children {
      padding-left: var(--tree-indent);
    }

    .tree-node-toggle {
      width: 16px;
      flex-shrink: 0;
      text-align: center;
      color: var(--muted);
      font-size: 10px;
      transition: transform 0.15s;
    }

    .tree-node-toggle.expanded {
      transform: rotate(90deg);
    }

    .tree-node-toggle.hidden-toggle {
      visibility: hidden;
    }

    .tree-context-menu {
      position: fixed;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow-lg);
      padding: 4px;
      min-width: 130px;
      z-index: 50;
      display: none;
    }

    .tree-context-menu.open {
      display: block;
    }

    /* Content panel (right) */
    .content-panel {
      flex: 1;
      overflow-y: auto;
      padding: 32px 40px;
      background: var(--bg);
      transition: background var(--transition);
    }

    .content-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--muted);
    }

    .content-empty p {
      font-size: 14px;
    }

    /* Markdown viewer */
    .markdown-body {
      max-width: 720px;
      margin: 0 auto;
      line-height: 1.7;
      font-size: 15px;
    }

    .markdown-body h1 {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 28px;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .markdown-body h2 {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 20px;
      letter-spacing: -0.01em;
      margin-top: 28px;
      margin-bottom: 8px;
    }

    .markdown-body h3 {
      font-weight: 600;
      font-size: 16px;
      margin-top: 20px;
      margin-bottom: 6px;
    }

    .markdown-body p {
      margin-bottom: 12px;
      color: var(--fg);
    }

    .markdown-body strong {
      font-weight: 600;
    }

    .markdown-body code {
      font-family: var(--font-mono);
      font-size: 13px;
      background: var(--accent-bg);
      padding: 2px 6px;
      border-radius: 4px;
    }

    .markdown-body pre {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      overflow-x: auto;
      margin-bottom: 14px;
    }

    .markdown-body pre code {
      background: none;
      padding: 0;
      font-size: 13px;
      line-height: 1.6;
    }

    .markdown-body ul,
    .markdown-body ol {
      margin-bottom: 12px;
      padding-left: 20px;
    }

    .markdown-body li {
      margin-bottom: 4px;
    }

    .markdown-body blockquote {
      border-inline-start: 3px solid var(--accent);
      margin: 14px 0;
      padding: 8px 16px;
      background: var(--surface);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      color: var(--muted);
    }

    .markdown-body hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 20px 0;
    }

    .markdown-body table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 14px;
      font-size: 13px;
    }

    .markdown-body th,
    .markdown-body td {
      padding: 8px 12px;
      border: 1px solid var(--border);
      text-align: start;
    }

    .markdown-body th {
      background: var(--surface);
      font-weight: 510;
      font-size: 12px;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* Editor */
    .editor-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    #editor-textarea {
      width: 100%;
      min-height: 400px;
      font-family: var(--font-mono);
      font-size: 14px;
      line-height: 1.7;
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      resize: vertical;
      background: var(--surface);
      color: var(--fg);
      transition: background var(--transition), border var(--transition);
    }

    #editor-textarea:focus {
      border-color: var(--accent);
    }

    /* Breadcrumb */
    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .breadcrumb span {
      color: var(--muted);
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {

      'file-arch': `# Agent 架构

## 整体架构

\`\`\`
┌─────────────────────────────┐
│         User Interface       │
├─────────────────────────────┤
│        Orchestrator          │
├─────────────────────────────┤
│   Agent    │    Agent    │
├────────────┼────────────┤
│   Tools    │   Memory    │
├────────────┼────────────┤
│   LLM Backend (GPT-4o...)   │
└─────────────────────────────┘
\`\`\`

## 核心组件

### Orchestrator（编排器）
负责任务分解、Agent 调度和结果聚合。是整个系统的**调度中心**。

### Agent（智能体）
独立的任务执行单元。每个 Agent 拥有：
- **系统指令**（System Prompt）
- **工具列表**（Tools）
- **记忆模块**（Memory）

### Tool（工具）
Agent 可以调用的外部能力，例如：
- 网络搜索
- 文件读写
- 数据库查询
- API 调用

### Memory（记忆）
- **短期记忆**：当前会话上下文
- **长期记忆**：跨会话的知识存储`,

      'file-tools': `# 工具调用

@tool

    """读取本地文件"""
    with open(path, 'r') as f:
        return f.read()
\`\`\`

1. Agent 生成工具调用请求
2. Orchestrator 执行工具函数
3. 结果返回给 Agent
4. Agent 基于结果生成最终回复

\`\`\``,

## 安全原则

1. **最小权限** — Agent 只获得完成任务所需的最小工具权限

## 敏感信息处理

\`\`\`python
class SecureAgent(Agent):
    def __init__(self):
        super().__init__()
        self.redactor = Redactor(
            patterns=[
                r'API_KEY_.*',
                r'password.*',
                r'token.*'
            ]
        )

    def process(self, input_text):
        clean_text = self.redactor.redact(input_text)
        return super().process(clean_text)

    function getFileContent(fileId) {

    function findNode(tree, id) {
      for (const n of tree) {
        if (n.id === id) return n;
        if (n.children) {
          const found = findNode(n.children, id);
          if (found) return found;
        }
      }
      return null;
    }

    function findParent(tree, id) {
      for (const n of tree) {
        if (n.children) {
          if (n.children.some(c => c.id === id)) return n;
          const found = findParent(n.children, id);
          if (found) return found;
        }
      }
      return null;
    }

    function getAllFileIds(tree) {
      let ids = [];
      for (const n of tree) {
        if (n.type === 'file' && n.fileId) ids.push(n.id);
        if (n.children) ids = ids.concat(getAllFileIds(n.children));
      }
      return ids;
    }

    function getFolderPaths(tree, prefix = '') {
      let paths = [];
      for (const n of tree) {
        if (n.type === 'folder') {
          const path = prefix + n.name;
          paths.push({ id: n.id, path });
          if (n.children) paths = paths.concat(getFolderPaths(n.children, path + '/'));
        }
      }
      return paths;
    }

    // ============================================================
    // MARKDOWN RENDERER
    // ============================================================
    function renderMarkdown(md) {
      let html = md
        // code block (must be first)
        .replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
          const escaped = escapeHtml(code);
          return `<pre><code>${escaped}</code></pre>`;
        })
        // inline code
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        // headings
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/^# (.+)$/gm, '<h1>$1</h1>')
        // blockquote
        .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
        // horizontal rule
        .replace(/^---$/gm, '<hr>')
        // bold & italic
        .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/_(.+?)_/g, '<em>$1</em>')
        // tables
        .replace(/\n((\|[^\n]+\|\n)((?:\|[^\n]+\|\n?)*))/g, (match) => {
          const lines = match.trim().split('\n');
          if (lines.length < 2) return match;
          const headerCells = lines[0].split('|').filter(c => c.trim());
          const header = headerCells.map(c => `<th>${c.trim()}</th>`).join('');
          const sep = lines[1];
          const rows = lines.slice(2).map(line => {
            const cells = line.split('|').filter(c => c.trim());
            return `<tr>${cells.map(c => `<td>${c.trim()}</td>`).join('')}</tr>`;
          }).join('');
          return `<table><thead><tr>${header}</tr></thead><tbody>${rows}</tbody></table>`;
        })
        // images
        .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img alt="$1" src="$2" style="max-width:100%">')
        // links
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>')
        // unordered list
        .replace(/^[\s]*[-*] (.+)$/gm, '<li>$1</li>')
        // ordered list
        .replace(/^[\s]*\d+\. (.+)$/gm, '<li>$1</li>')
        // paragraphs: wrap remaining lines
        .replace(/\n\n/g, '</p><p>')
        .replace(/^(?!<[hbp<ta]|<\/[hbp]|<li|<bl|<hr)(.+)$/gm, '$1');

      // Wrap consecutive <li> in <ul>
      html = html.replace(/(<li>.*?<\/li>(\s*<li>.*?<\/li>)*)/gs, '<ul>$1</ul>');

      // Wrap blockquotes that might have been split
      html = html.replace(/(<blockquote>.*?<\/blockquote>(\s*<blockquote>.*?<\/blockquote>)*)/gs, match => {
        return match.replace(/<\/blockquote>\s*<blockquote>/g, '<br>');
      });

      return `<p>${html}</p>`;
    }

    function getAllTags() {
      const tags = new Set();
      state.kbs.forEach(kb => kb.tags.forEach(t => tags.add(t)));
      return [...tags].sort();
    }

    function renderTags() {
      const container = document.getElementById('tags-filter');
      const tags = getAllTags();
      if (tags.length === 0) { container.innerHTML = ''; return; }
      let html = '<span class="tag-chip' + (state.filterTag === null ? ' active' : '') + '" data-tag="">全部</span>';
      tags.forEach(t => {
        html += '<span class="tag-chip' + (state.filterTag === t ? ' active' : '') + '" data-tag="' + escapeHtml(t) + '">' + escapeHtml(t) + '</span>';
      });
      container.innerHTML = html;
      container.querySelectorAll('.tag-chip').forEach(el => {
        el.addEventListener('click', () => {
          const tag = el.dataset.tag || null;
          state.filterTag = tag;
          renderTags();
          renderKbList();
        });
      });
    }

    function getFilteredKbs() {
      let list = state.kbs;
      if (state.filterTag) list = list.filter(kb => kb.tags.includes(state.filterTag));
      if (state.searchQuery) {
        const q = state.searchQuery.toLowerCase();
        list = list.filter(kb =>
          kb.name.toLowerCase().includes(q) || kb.description.toLowerCase().includes(q)
        );
      }
      return list;
    }

      container.querySelectorAll('.kb-card').forEach(el => {
        const kbId = el.dataset.kbId;
        el.addEventListener('click', e => {
          if (e.target.closest('.kb-menu')) return;
          navigateToDetail(kbId);
        });
        // Drag
        el.addEventListener('dragstart', e => {
          state.draggedId = kbId;
          el.classList.add('dragging');
          e.dataTransfer.effectAllowed = 'move';
        });
        el.addEventListener('dragend', () => {
          el.classList.remove('dragging');
          state.draggedId = null;
        });
        el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('drag-over'); });
        el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
        el.addEventListener('drop', e => {
          e.preventDefault();
          el.classList.remove('drag-over');
          if (state.draggedId && state.draggedId !== kbId) {
            const fromIdx = state.kbs.findIndex(k => k.id === state.draggedId);
            const toIdx = state.kbs.findIndex(k => k.id === kbId);
            if (fromIdx !== -1 && toIdx !== -1) {
              const [moved] = state.kbs.splice(fromIdx, 1);
              state.kbs.splice(toIdx, 0, moved);
              renderKbList();
            }
          }
        });
      });

      // KB menu dropdowns
      document.querySelectorAll('[data-menu-btn]').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();

          document.querySelectorAll('.kb-dropdown.open').forEach(d => {
            if (d.dataset.dropdown !== id) d.classList.remove('open');
          });
          const dd = document.querySelector(`[data-dropdown="${id}"]`);
          if (dd) dd.classList.toggle('open');
        });
      });
      // Close dropdowns on outside click
      document.addEventListener('click', () => {
        document.querySelectorAll('.kb-dropdown.open').forEach(d => d.classList.remove('open'));
      }, true);

      // Dropdown actions
      document.querySelectorAll('[data-action="rename"]').forEach(btn => {
        btn.addEventListener('click', e => { e.stopPropagation(); renameKb(btn.dataset.id); });
      });
      document.querySelectorAll('[data-action="delete"]').forEach(btn => {
        btn.addEventListener('click', e => { e.stopPropagation(); deleteKb(btn.dataset.id); });
      });
      refreshIcons();
    }

      const name = document.getElementById('new-kb-name').value.trim();
      const desc = document.getElementById('new-kb-desc').value.trim();
      const tagsStr = document.getElementById('new-kb-tags').value.trim();
      if (!name) return;
      const tags = tagsStr ? tagsStr.split(/[,，]/).map(s => s.trim()).filter(Boolean) : [];
      const selectedCover = document.querySelector('#cover-picker input[name="kb-cover"]:checked');
      const id = 'kb-' + Date.now();
      state.kbs.unshift({
        id,
        name,
        description: desc || '暂无描述',
        tags,
        fileCount: 0,
        updatedAt: new Date().toISOString().slice(0, 10),
        cover: selectedCover ? selectedCover.value : 'circuit',
        children: []
      });
      closeModal('create-modal');
      renderTags();
      renderKbList();
    });

    document.getElementById('create-kb-btn').addEventListener('click', createKb);
    document.getElementById('cancel-create').addEventListener('click', () => closeModal('create-modal'));

    function renameKb(id) {
      const kb = state.kbs.find(k => k.id === id);
      if (!kb) return;
      state.renameTarget = { type: 'kb', id };
      document.getElementById('rename-input').value = kb.name;
      openModal('rename-modal');
    }

    document.getElementById('confirm-rename').addEventListener('click', () => {
      const name = document.getElementById('rename-input').value.trim();
      if (!name || !state.renameTarget) return;
      if (state.renameTarget.type === 'kb') {
        const kb = state.kbs.find(k => k.id === state.renameTarget.id);
        if (kb) kb.name = name;
      } else if (state.renameTarget.type === 'file') {
        const kb = state.kbs.find(k => k.id === state.renameTarget.kbId);
        if (kb) {
          const node = findNode(kb.children, state.renameTarget.id);
          if (node) node.name = name;
        }
        renderFileTree();
        const fn = document.getElementById('editor-filename');
        if (fn) fn.textContent = name;
      }
      state.renameTarget = null;
      closeModal('rename-modal');
      renderKbList();
      if (state.currentKbId) {
        const title = document.getElementById('detail-title');
        const kb = state.kbs.find(k => k.id === state.currentKbId);
        if (kb) title.textContent = kb.name;
      }
    });

    document.getElementById('cancel-rename').addEventListener('click', () => {
      state.renameTarget = null;
      closeModal('rename-modal');
    });

    function deleteKb(id) {
      const kb = state.kbs.find(k => k.id === id);
      if (!kb) return;
      state.deleteTarget = { type: 'kb', id };
      document.getElementById('delete-msg').textContent = `确定要删除「${kb.name}」吗？此操作不可撤销。`;
      openModal('delete-modal');
    }

    document.getElementById('confirm-delete').addEventListener('click', () => {
      if (!state.deleteTarget) return;
      if (state.deleteTarget.type === 'kb') {
        state.kbs = state.kbs.filter(k => k.id !== state.deleteTarget.id);
      } else if (state.deleteTarget.type === 'file') {
        const kb = state.kbs.find(k => k.id === state.deleteTarget.kbId);
        if (kb) {
          const parent = findParent(kb.children, state.deleteTarget.id);
          if (parent) {
            parent.children = (parent.children || []).filter(c => c.id !== state.deleteTarget.id);
          } else {
            kb.children = kb.children.filter(c => c.id !== state.deleteTarget.id);
          }
          kb.fileCount = Math.max(0, kb.fileCount - 1);
          renderFileTree();
        }
      }
      state.deleteTarget = null;
      closeModal('delete-modal');
      renderKbList();
    });

    document.getElementById('cancel-delete').addEventListener('click', () => {
      state.deleteTarget = null;
      closeModal('delete-modal');
    });

    // ============================================================
    // NAVIGATION
    // ============================================================
    function navigateToDetail(kbId) {
      state.currentKbId = kbId;
      currentKb = state.kbs.find(k => k.id === kbId);
      if (!currentKb) return;

      document.getElementById('screen-list').classList.add('hidden');
      document.getElementById('screen-detail').classList.remove('hidden');
      document.getElementById('detail-title').textContent = currentKb.name;
      state.currentFileId = null;
      state.editing = false;

      document.getElementById('content-empty').classList.remove('hidden');
      document.getElementById('markdown-viewer').classList.add('hidden');
      document.getElementById('editor-section').classList.add('hidden');

      renderFileTree();
    }

    document.getElementById('back-btn').addEventListener('click', () => {
      state.currentKbId = null;
      state.currentFileId = null;
      currentKb = null;
      document.getElementById('screen-detail').classList.add('hidden');
      document.getElementById('screen-list').classList.remove('hidden');
      renderKbList();
    });

    // ============================================================
    // FILE TREE
    // ============================================================
    function renderFileTree() {
      const container = document.getElementById('file-tree');
      if (!currentKb) { container.innerHTML = ''; return; }
      let html = buildTreeHtml(currentKb.children, 0);
      container.innerHTML = html;
      bindTreeEvents(currentKb.children);
      refreshIcons();
    }

    function buildTreeHtml(nodes, depth) {
      let html = '';
      const query = state.fileSearchQuery.toLowerCase();
      for (const node of nodes) {
        const isFolder = node.type === 'folder';
        const nameMatch = !query || node.name.toLowerCase().includes(query);

        if (isFolder) {
          const childrenHtml = buildTreeHtml(node.children || [], depth + 1);
          const hasVisibleChildren = !query || childrenHtml.includes('tree-node-content');

          if (query && !nameMatch && !hasVisibleChildren) continue;

          const isExpanded = query ? true : node.expanded;
          html += `<div class="tree-node" data-id="${node.id}" data-type="folder">
        <div class="tree-node-content${state.currentFileId === node.id ? ' active' : ''}">
          <span class="tree-node-toggle${isExpanded ? ' expanded' : ''}${(!node.children || node.children.length === 0) ? ' hidden-toggle' : ''}"><i data-lucide="chevron-right" style="width:12px;height:12px"></i></span>
          <span class="tree-node-icon folder-icon"><i data-lucide="folder" style="width:14px;height:14px"></i></span>
          <span class="tree-node-name">${escapeHtml(node.name)}</span>
        </div>
        <div class="tree-children" style="display:${isExpanded ? 'block' : 'none'}">
          ${childrenHtml}
        </div>
      </div>`;
        } else {
          if (query && !nameMatch) continue;
          html += `<div class="tree-node" data-id="${node.id}" data-type="file">
        <div class="tree-node-content${state.currentFileId === node.id ? ' active' : ''}">
          <span class="tree-node-toggle hidden-toggle"><i data-lucide="chevron-right" style="width:12px;height:12px"></i></span>
          <span class="tree-node-icon"><i data-lucide="file-text" style="width:14px;height:14px"></i></span>
          <span class="tree-node-name">${escapeHtml(node.name)}</span>
        </div>
      </div>`;
        }
      }
      return html;
    }

    function bindTreeEvents(nodes) {
      const container = document.getElementById('file-tree');
      container.querySelectorAll('.tree-node-content').forEach(el => {
        const nodeDiv = el.closest('.tree-node');
        if (!nodeDiv) return;
        const id = nodeDiv.dataset.id;
        const type = nodeDiv.dataset.type;

        el.addEventListener('click', e => {
          if (type === 'folder') {
            const toggle = el.querySelector('.tree-node-toggle');
            const children = nodeDiv.querySelector('.tree-children');
            if (children) {
              const isOpen = children.style.display !== 'none';
              children.style.display = isOpen ? 'none' : 'block';
              if (toggle) toggle.classList.toggle('expanded');
              const node = findNode(nodes, id);
              if (node) node.expanded = !isOpen;
            }
          } else {
            openFile(id);
          }
        });

        el.addEventListener('contextmenu', e => {
          e.preventDefault();
          if (type !== 'file') return;
          state.selectedFileId = id;
          const menu = document.getElementById('tree-context-menu');
          menu.style.left = e.clientX + 'px';
          menu.style.top = e.clientY + 'px';
          menu.classList.add('open');
        });
      });
    }

    // Close tree context menu
    document.addEventListener('click', () => {
      document.getElementById('tree-context-menu').classList.remove('open');
    });

    document.querySelectorAll('#tree-context-menu .kb-dropdown-item').forEach(btn => {
      btn.addEventListener('click', () => {
        const action = btn.dataset.action;
        const id = state.selectedFileId;
        if (!id || !currentKb) return;
        const node = findNode(currentKb.children, id);
        if (!node) return;

        if (action === 'rename-file') {
          state.renameTarget = { type: 'file', id, kbId: currentKb.id };
          document.getElementById('rename-file-input').value = node.name;
          openModal('rename-file-modal');
        } else if (action === 'delete-file') {
          state.deleteTarget = { type: 'file', id, kbId: currentKb.id };
          document.getElementById('delete-msg').textContent = `确定要删除「${node.name}」吗？`;
          openModal('delete-modal');
        }
        document.getElementById('tree-context-menu').classList.remove('open');
      });
    });

    document.getElementById('confirm-rename-file').addEventListener('click', () => {
      const name = document.getElementById('rename-file-input').value.trim();
      if (!name || !state.renameTarget) return;
      const kb = state.kbs.find(k => k.id === state.renameTarget.kbId);
      if (kb) {
        const node = findNode(kb.children, state.renameTarget.id);
        if (node) node.name = name;
      }
      state.renameTarget = null;
      closeModal('rename-file-modal');
      renderFileTree();
      document.getElementById('editor-filename').textContent = name;
    });

    document.getElementById('cancel-rename-file').addEventListener('click', () => {
      state.renameTarget = null;
      closeModal('rename-file-modal');
    });

    // ============================================================
    // FILE OPEN / VIEW / EDIT
    // ============================================================
    function openFile(fileId) {
      state.currentFileId = fileId;
      state.editing = false;
      const node = currentKb ? findNode(currentKb.children, fileId) : null;
      if (!node) return;

      // Update tree active state
      renderFileTree();

      const content = getFileContent(node.fileId);

      document.getElementById('content-empty').classList.add('hidden');
      document.getElementById('markdown-viewer').classList.remove('hidden');
      document.getElementById('editor-section').classList.add('hidden');

      const viewer = document.getElementById('markdown-viewer');
      viewer.innerHTML = renderMarkdown(content);

      // Breadcrumb
      const parent = findParent(currentKb.children, fileId);
      const breadcrumb = parent
        ? `<div class="breadcrumb"><span>${escapeHtml(parent.name)}</span><span>/</span><span>${escapeHtml(node.name)}</span></div>`
        : `<div class="breadcrumb"><span>${escapeHtml(node.name)}</span></div>`;
      viewer.innerHTML = breadcrumb + viewer.innerHTML;

      // Edit button in viewer toolbar
      const toolbar = `<div class="editor-toolbar" style="margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border)">
    <span style="font-size:13px;font-weight:510;flex:1;color:var(--fg)">${escapeHtml(node.name)}</span>
    <button class="btn-secondary" id="start-edit-btn"><i data-lucide="pencil" style="width:13px;height:13px"></i> 编辑</button>
  </div>`;
      viewer.innerHTML = toolbar + viewer.innerHTML;
      refreshIcons();

      document.getElementById('start-edit-btn').addEventListener('click', startEditing);
    }

    function startEditing() {
      state.editing = true;
      const node = currentKb ? findNode(currentKb.children, state.currentFileId) : null;
      if (!node) return;

      const content = getFileContent(node.fileId);

      document.getElementById('markdown-viewer').classList.add('hidden');
      document.getElementById('editor-section').classList.remove('hidden');
      document.getElementById('editor-filename').textContent = node.name;
      document.getElementById('editor-textarea').value = content;
    }

    document.getElementById('save-edit-btn').addEventListener('click', () => {
      state.editing = false;
      const content = document.getElementById('editor-textarea').value;
      const node = currentKb ? findNode(currentKb.children, state.currentFileId) : null;
      if (node) {
        // Save back (in-memory for prototype)
        const fileId = node.fileId;
        DEMO_FILES[fileId] = content;
      }
      // Switch back to viewer
      document.getElementById('editor-section').classList.add('hidden');
      document.getElementById('markdown-viewer').classList.remove('hidden');
      openFile(state.currentFileId); // re-render viewer
    });

    document.getElementById('cancel-edit-btn').addEventListener('click', () => {
      state.editing = false;
      document.getElementById('editor-section').classList.add('hidden');
      document.getElementById('markdown-viewer').classList.remove('hidden');
      openFile(state.currentFileId);
    });

    // ============================================================
    // UPLOAD FILE
    // ============================================================
    document.getElementById('upload-file-btn').addEventListener('click', () => {
      if (!currentKb) return;
      const select = document.getElementById('upload-folder');
      select.innerHTML = '<option value="__root__">/ (根目录)</option>';
      const folders = getFolderPaths(currentKb.children);
      folders.forEach(f => {
        select.innerHTML += `<option value="${f.id}">${escapeHtml(f.path)}</option>`;
      });
      document.getElementById('upload-filename').value = '';
      openModal('upload-modal');
    });

    document.getElementById('confirm-upload').addEventListener('click', () => {
      const name = document.getElementById('upload-filename').value.trim();
      if (!name || !currentKb) return;
      const folderId = document.getElementById('upload-folder').value;
      const fileId = 'file-' + Date.now();

      DEMO_FILES[fileId] = '# 新建文档\n\n内容待补充。\n';

      const newNode = { id: 'f-' + Date.now(), name, type: 'file', fileId };
      if (folderId === '__root__') {
        currentKb.children.push(newNode);
      } else {
        const parent = findNode(currentKb.children, folderId);
        if (parent) {
          if (!parent.children) parent.children = [];
          parent.children.push(newNode);
        }
      }
      currentKb.fileCount = (currentKb.fileCount || 0) + 1;
      closeModal('upload-modal');
      renderFileTree();
      renderKbList();
    });

    document.getElementById('cancel-upload').addEventListener('click', () => closeModal('upload-modal'));

    // ============================================================
    // SEARCH
    // ============================================================
    document.getElementById('kb-search').addEventListener('input', e => {
      state.searchQuery = e.target.value;
      renderKbList();
    });

    document.getElementById('file-search').addEventListener('input', e => {
      state.fileSearchQuery = e.target.value;
      renderFileTree();
    });

    document.getElementById('search-files-btn').addEventListener('click', () => {
      const input = document.getElementById('file-search');
      input.focus();
      input.select();
    });

    // ============================================================
    // VIEW TOGGLE
    // ============================================================
    document.querySelectorAll('.view-toggle .icon-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.view-toggle .icon-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        state.viewMode = btn.dataset.view;
        const container = document.getElementById('kb-container');
        container.className = state.viewMode === 'grid' ? 'kb-grid' : 'kb-list';
        renderKbList();
      });
    });

    // ============================================================
    // DARK MODE
    // ============================================================
    document.getElementById('dark-toggle-list').addEventListener('click', toggleTheme);
    document.getElementById('dark-toggle-detail').addEventListener('click', toggleTheme);

    // ============================================================
    // KEYBOARD SHORTCUTS
    // ============================================================
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        document.querySelectorAll('.modal-overlay.open').forEach(m => m.classList.remove('open'));
        document.getElementById('tree-context-menu').classList.remove('open');
      }
    });

    // ============================================================
    // INIT
    // ============================================================
    renderTags();
    renderKbList();
    refreshIcons();
  </script>
</body>

</html>
